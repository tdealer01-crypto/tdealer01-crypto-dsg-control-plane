n) => {\n        const msg = error instanceof Error ? error.message : 'unknown';\n        return Response.json({ error: msg }, { status: 500 });\n      }),\n    }));\n\n    const { GET } = await import('../../../app/api/readiness/route');\n    const res = await GET();\n    const body = await res.json();\n\n    expect(body.checks).toHaveProperty('env');\n    expect(body.checks).toHaveProperty('nextAuthSecret');\n    expect(body.checks).toHaveProperty('supabaseServiceRole');\n    expect(body.checks).toHaveProperty('dsgCoreConfig');\n    expect(body.checks).toHaveProperty('dsgCoreHealth');\n  });\n\n  it('returns 500 when getDeploymentReadiness throws', async () => {\n    vi.doMock('../../../lib/deployment/readiness', () => ({\n      getDeploymentReadiness: vi.fn(async () => {\n        throw new Error('readiness_probe_failed');\n      }),\n    }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, _error: unknown) => {\n        return Response.json({ error: 'Internal server error' }, { status: 500 });\n      }),\n    }));\n\n    const { GET } = await import('../../../app/api/readiness/route');\n    const res = await GET();\n\n    expect(res.status).toBe(500);\n  });\n});\n"},"tests/unit/runtime/gate.test.ts":{"tests":[{"id":"87","name":"detectOscillation returns false when window has fewer scores than required"},{"id":"88","name":"detectOscillation returns false for empty array"},{"id":"89","name":"detectOscillation returns false when spread is below threshold"},{"id":"90","name":"detectOscillation returns true when max-min >= oscillationSpread"},{"id":"91","name":"detectOscillation uses only the last oscillationWindow entries"},{"id":"92","name":"detectOscillation respects custom oscillationWindow and oscillationSpread"},{"id":"93","name":"detectOscillation returns false when called with no arguments (default empty array)"},{"id":"94","name":"detectOscillation returns true when spread equals exactly oscillationSpread threshold (0.35)"},{"id":"95","name":"detectOscillation returns false when spread is one epsilon below oscillationSpread (0.35)"},{"id":"96","name":"evaluateGate — default policy returns BLOCK when riskScore >= blockRiskScore (0.8)"},{"id":"97","name":"evaluateGate — default policy returns STABILIZE when riskScore >= stabilizeRiskScore (0.4) and no oscillation"},{"id":"98","name":"evaluateGate — default policy returns STABILIZE on oscillation even with low riskScore"},{"id":"99","name":"evaluateGate — default policy returns ALLOW when risk is low and stable"},{"id":"100","name":"evaluateGate — default policy returns ALLOW with no recentRiskScores and low riskScore"},{"id":"101","name":"evaluateGate — default policy BLOCK takes priority over oscillation"},{"id":"102","name":"evaluateGate — default policy includes reason string in all decision types"},{"id":"103","name":"evaluateGate — custom policy respects custom blockRiskScore"},{"id":"104","name":"evaluateGate — custom policy respects custom stabilizeRiskScore"},{"id":"105","name":"evaluateGate — custom policy applies custom oscillation params"}],"source":"import { describe, it, expect } from 'vitest';\nimport { detectOscillation, evaluateGate } from '../../../lib/runtime/gate';\nimport type { GatePolicy } from '../../../lib/runtime/gate';\n\nconst STRICT: GatePolicy = {\n  blockRiskScore: 0.7,\n  stabilizeRiskScore: 0.3,\n  oscillationWindow: 3,\n  oscillationSpread: 0.2,\n};\n\ndescribe('detectOscillation', () => {\n  it('returns false when window has fewer scores than required', () => {\n    expect(detectOscillation([0.1, 0.8])).toBe(false);\n  });\n\n  it('returns false for empty array', () => {\n    expect(detectOscillation([])).toBe(false);\n  });\n\n  it('returns false when spread is below threshold', () => {\n    expect(detectOscillation([0.1, 0.12, 0.11, 0.13])).toBe(false);\n  });\n\n  it('returns true when max-min >= oscillationSpread', () => {\n    expect(detectOscillation([0.1, 0.6, 0.2, 0.58])).toBe(true);\n  });\n\n  it('uses only the last oscillationWindow entries', () => {\n    // first 4 scores oscillate heavily, but last 4 are stable\n    expect(detectOscillation([0.1, 0.9, 0.1, 0.9, 0.5, 0.51, 0.52, 0.53])).toBe(false);\n  });\n\n  it('respects custom oscillationWindow and oscillationSpread', () => {\n    // spread = 0.21 >= STRICT.oscillationSpread=0.2, window=3 → oscillates\n    expect(detectOscillation([0.1, 0.31], STRICT)).toBe(false); // only 2 <"+" window=3\n    expect(detectOscillation([0.1, 0.31, 0.1], STRICT)).toBe(true); // spread=0.21 ≥ 0.2\n  });\n\n  it('returns false when called with no arguments (default empty array)', () => {\n    expect(detectOscillation()).toBe(false);\n  });\n\n  it('returns true when spread equals exactly oscillationSpread threshold (0.35)', () => {\n    // default oscillationSpread=0.35, window=4; max-min = 0.35-0.0 = 0.35 >= 0.35 → true\n    expect(detectOscillation([0.0, 0.35, 0.0, 0.35])).toBe(true);\n  });\n\n  it('returns false when spread is one epsilon below oscillationSpread (0.35)', () => {\n    // spread = 0.34, which is <"+" 0.35 → false\n    expect(detectOscillation([0.0, 0.34, 0.0, 0.34])).toBe(false);\n  });\n});\n\ndescribe('evaluateGate — default policy', () => {\n  it('returns BLOCK when riskScore >= blockRiskScore (0.8)', () => {\n    expect(evaluateGate({ riskScore: 0.8 }).decision).toBe('BLOCK');\n    expect(evaluateGate({ riskScore: 0.99 }).decision).toBe('BLOCK');\n    expect(evaluateGate({ riskScore: 1.0 }).decision).toBe('BLOCK');\n  });\n\n  it('returns STABILIZE when riskScore >= stabilizeRiskScore (0.4) and no oscillation', () => {\n    expect(evaluateGate({ riskScore: 0.4 }).decision).toBe('STABILIZE');\n    expect(evaluateGate({ riskScore: 0.5 }).decision).toBe('STABILIZE');\n    expect(evaluateGate({ riskScore: 0.79 }).decision).toBe('STABILIZE');\n  });\n\n  it('returns STABILIZE on oscillation even with low riskScore', () => {\n    const result = evaluateGate({ riskScore: 0.2, recentRiskScores: [0.1, 0.6, 0.2, 0.58] });\n    expect(result.decision).toBe('STABILIZE');\n    expect(result.reason).toContain('oscillation');\n  });\n\n  it('returns ALLOW when risk is low and stable', () => {\n    expect(evaluateGate({ riskScore: 0.1, recentRiskScores: [0.1, 0.11, 0.12, 0.13] }).decision).toBe('ALLOW');\n    expect(evaluateGate({ riskScore: 0.0 }).decision).toBe('ALLOW');\n    expect(evaluateGate({ riskScore: 0.39 }).decision).toBe('ALLOW');\n  });\n\n  it('returns ALLOW with no recentRiskScores and low riskScore', () => {\n    expect(evaluateGate({ riskScore: 0.1 }).decision).toBe('ALLOW');\n  });\n\n  it('BLOCK takes priority over oscillation', () => {\n    const result = evaluateGate({ riskScore: 0.95, recentRiskScores: [0.1, 0.9, 0.1, 0.9] });\n    expect(result.decision).toBe('BLOCK');\n    expect(result.reason).toContain('block threshold');\n  });\n\n  it('includes reason string in all decision types', () => {\n    expect(evaluateGate({ riskScore: 0.99 }).reason).toBeTruthy();\n    expect(evaluateGate({ riskScore: 0.5 }).reason).toBeTruthy();\n    expect(evaluateGate({ riskScore: 0.1 }).reason).toBeTruthy();\n  });\n});\n\ndescribe('evaluateGate — custom policy', () => {\n  it('respects custom blockRiskScore', () => {\n    expect(evaluateGate({ riskScore: 0.7 }, STRICT).decision).toBe('BLOCK');\n    expect(evaluateGate({ riskScore: 0.69 }, STRICT).decision).not.toBe('BLOCK');\n  });\n\n  it('respects custom stabilizeRiskScore', () => {\n    expect(evaluateGate({ riskScore: 0.3 }, STRICT).decision).toBe('STABILIZE');\n    expect(evaluateGate({ riskScore: 0.29 }, STRICT).decision).toBe('ALLOW');\n  });\n\n  it('applies custom oscillation params', () => {\n    // 3-score window, spread=0.2 → [0.1, 0.31, 0.1] triggers STABILIZE at low riskScore=0.1\n    const result = evaluateGate({ riskScore: 0.1, recentRiskScores: [0.1, 0.31, 0.1] }, STRICT);\n    expect(result.decision).toBe('STABILIZE');\n  });\n});\n"},"tests/unit/spine/pipeline-infra.test.ts":{"tests":[{"id":"106","name":"SpineInfraError is an instance of Error"},{"id":"107","name":"SpineInfraError has correct name property"},{"id":"108","name":"SpineInfraError carries the message through"},{"id":"109","name":"runPipeline — SpineInfraError cases throws SpineInfraError when gate plugin is not found"},{"id":"110","name":"runPipeline — SpineInfraError cases throws SpineInfraError when registered plugin has wrong kind"},{"id":"111","name":"runPipeline — initial string literal state ALLOW gate with no arbiters: final_decision is ALLOW, final_reason is gate reason"}],"source":"import { describe, it, expect } from 'vitest';\nimport { SpineInfraError } from '../../../lib/spine/pipeline';\nimport { registry } from '../../../lib/spine/plugin';\nimport type { DSGPlugin } from '../../../lib/spine/plugin';\nimport type { PluginOutput } from '../../../lib/spine/types';\n\ndescribe('SpineInfraError', () => {\n  it('is an instance of Error', () => {\n    const err = new SpineInfraError('test message');\n    expect(err).toBeInstanceOf(Error);\n    expect(err).toBeInstanceOf(SpineInfraError);\n  });\n\n  it('has correct name property', () => {\n    const err = new SpineInfraError('GATE_PLUGIN_NOT_FOUND');\n    expect(err.name).toBe('SpineInfraError');\n  });\n\n  it('carries the message through', () => {\n    const err = new SpineInfraError('GATE_PLUGIN_INVALID_KIND');\n    expect(err.message).toBe('GATE_PLUGIN_INVALID_KIND');\n  });\n});\n\ndescribe('runPipeline — SpineInfraError cases', () => {\n  it('throws SpineInfraError when gate plugin is not found', async () => {\n    const { runPipeline } = await import('../../../lib/spine/pipeline');\n    const saved = process.env.DSG_SPINE_GATE_PLUGIN;\n    process.env.DSG_SPINE_GATE_PLUGIN = 'nonexistent-plugin-xyz';\n    try {\n      await expect(\n        runPipeline({\n          org_id: 'org_1', agent_id: 'agt_1', action: 'test', payload: {},\n          truth_state: null, approval: null,\n          spine: { request_id: 'req_infra_1', received_at: new Date().toISOString(), billing_period: '2026-05' },\n        }),\n      ).rejects.toBeInstanceOf(SpineInfraError);\n    } finally {\n      if (saved === undefined) delete process.env.DSG_SPINE_GATE_PLUGIN;\n      else process.env.DSG_SPINE_GATE_PLUGIN = saved;\n    }\n  });\n\n  it('throws SpineInfraError when registered plugin has wrong kind', async () => {\n    const wrongKindPlugin: DSGPlugin = {\n      id: 'test-wrong-kind-gate',\n      name: 'Wrong Kind Plugin',\n      kind: 'arbiter',\n      verification: { verified: true, solver: null, properties: [] },\n      health: async () => ({ ok: true }),\n      evaluate: async (): Promise<"+"PluginOutput> => ({\n        decision: 'ALLOW', reason: 'ok', policy_version: 'v1', latency_ms: 0,\n        proof: { proof_hash: null, proof_version: null, theorem_set_id: null, solver: null },\n        metrics: {},\n      }),\n    };\n\n    registry.registerIfAbsent(wrongKindPlugin);\n    const { runPipeline } = await import('../../../lib/spine/pipeline');\n    const saved = process.env.DSG_SPINE_GATE_PLUGIN;\n    process.env.DSG_SPINE_GATE_PLUGIN = 'test-wrong-kind-gate';\n    try {\n      await expect(\n        runPipeline({\n          org_id: 'org_1', agent_id: 'agt_1', action: 'test', payload: {},\n          truth_state: null, approval: null,\n          spine: { request_id: 'req_infra_2', received_at: new Date().toISOString(), billing_period: '2026-05' },\n        }),\n      ).rejects.toBeInstanceOf(SpineInfraError);\n    } finally {\n      if (saved === undefined) delete process.env.DSG_SPINE_GATE_PLUGIN;\n      else process.env.DSG_SPINE_GATE_PLUGIN = saved;\n    }\n  });\n});\n\ndescribe('runPipeline — initial string literal state', () => {\n  it('ALLOW gate with no arbiters: final_decision is ALLOW, final_reason is gate reason', async () => {\n    const allowGate2: DSGPlugin = {\n      id: 'test-allow-gate-2',\n      name: 'Allow Gate 2',\n      kind: 'gate',\n      verification: { verified: true, solver: null, properties: [] },\n      health: async () => ({ ok: true }),\n      evaluate: async (): Promise<"+"PluginOutput> => ({\n        decision: 'ALLOW',\n        reason: 'gate:CLEAR',\n        policy_version: 'test-policy-v2',\n        latency_ms: 1,\n        proof: { proof_hash: null, proof_version: null, theorem_set_id: null, solver: null },\n        metrics: {},\n      }),\n    };\n\n    registry.registerIfAbsent(allowGate2);\n    const { runPipeline } = await import('../../../lib/spine/pipeline');\n    const saved = process.env.DSG_SPINE_GATE_PLUGIN;\n    process.env.DSG_SPINE_GATE_PLUGIN = 'test-allow-gate-2';\n\n    try {\n      const result = await runPipeline({\n        org_id: 'org_1', agent_id: 'agt_1', action: 'read', payload: {},\n        truth_state: null, approval: null,\n        spine: { request_id: 'req_str_1', received_at: new Date().toISOString(), billing_period: '2026-05' },\n      });\n\n      expect(result.final_decision).toBe('ALLOW');\n      expect(result.final_reason).toBe('gate:CLEAR');\n      expect(result.final_policy_version).toBe('test-policy-v2');\n      expect(result.authoritative_plugin_id).toBe('test-allow-gate-2');\n    } finally {\n      if (saved === undefined) delete process.env.DSG_SPINE_GATE_PLUGIN;\n      else process.env.DSG_SPINE_GATE_PLUGIN = saved;\n    }\n  });\n});\n"},"tests/unit/spine/pipeline-approval.test.ts":{"tests":[{"id":"112","name":"issueSpineIntent + executeSpineIntent approval flow issues a new pending intent and reuses it on second call"},{"id":"113","name":"issueSpineIntent + executeSpineIntent approval flow returns 409 when intent already consumed"}],"source":"import { describe, it, expect, vi, beforeEach } from 'vitest';\n\ndescribe('issueSpineIntent + executeSpineIntent approval flow', () => {\n  beforeEach(() => {\n    vi.resetModules();\n  });\n\n  it('issues a new pending intent and reuses it on second call', async () => {\n    const rows: Record<"+"string, any[]> = {\n      runtime_approval_requests: [],\n      agents: [{ id: 'agt_1', org_id: 'org_1', status: 'active', api_key_hash: 'hash1', monthly_limit: 100 }],\n    };\n\n    const from = vi.fn((table: string) => ({\n      select: () => ({\n        eq: function () {\n          return this;\n        },\n        order: function () {\n          return this;\n        },\n        limit: function () {\n          return this;\n        },\n        maybeSingle: async () => {\n          const match = rows[table]?.find(() => true);\n          return { data: match ?? null, error: null };\n        },\n      }),\n      insert: (payload: any) => ({\n        select: () => ({\n          single: async () => {\n            const row = { ...payload, id: 'req_001', status: 'pending', expires_at: new Date(Date.now() + 300_000).toISOString() };\n            rows[table] = rows[table] || [];\n            rows[table].push(row);\n            return { data: row, error: null };\n          },\n        }),\n      }),\n    }));\n\n    vi.doMock('../../../lib/supabase-server', () => ({\n      getSupabaseAdmin: () => ({ from }),\n    }));\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey: vi.fn(async () => ({\n        id: 'agt_1', org_id: 'org_1', status: 'active', monthly_limit: 100,\n      })),\n    }));\n\n    const { issueSpineIntent } = await import('../../../lib/spine/engine');\n\n    const payload = {\n      agentId: 'agt_1',\n      action: 'scan',\n      input: {},\n      context: {},\n      canonicalRequest: { action: 'scan', input: {}, context: {} },\n    } as any;\n\n    const first = await issueSpineIntent({ orgId: 'org_1', apiKey: 'key1', payload });\n    expect(first.ok).toBe(true);\n    expect(first.status).toBe(200);\n    expect(first.body).toHaveProperty('request_id');\n\n    const second = await issueSpineIntent({ orgId: 'org_1', apiKey: 'key1', payload });\n    expect(second.ok).toBe(true);\n    expect(second.status).toBe(200);\n    if (!('reused' in second.body) || !('request_id' in second.body) || !('request_id' in first.body)) {\n      throw new Error('Expected pending intent payload in response body');\n    }\n\n    const firstBody = first.body as { request_id: string };\n    const secondBody = second.body as { request_id: string; reused: boolean };\n\n    expect(secondBody.reused).toBe(true);\n    expect(secondBody.request_id).toBe(firstBody.request_id);\n  });\n\n  it('returns 409 when intent already consumed', async () => {\n    const from = vi.fn(() => ({\n      select: () => ({\n        eq: function () {\n          return this;\n        },\n        order: function () {\n          return this;\n        },\n        limit: function () {\n          return this;\n        },\n        maybeSingle: async () => ({\n          data: { id: 'req_old', status: 'consumed', expires_at: null },\n          error: null,\n        }),\n      }),\n    }));\n\n    vi.doMock('../../../lib/supabase-server', () => ({\n      getSupabaseAdmin: () => ({ from }),\n    }));\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey: vi.fn(async () => ({\n        id: 'agt_1', org_id: 'org_1', status: 'active', monthly_limit: 100,\n      })),\n    }));\n\n    const { issueSpineIntent } = await import('../../../lib/spine/engine');\n\n    const payload = {\n      agentId: 'agt_1', action: 'scan', input: {}, context: {},\n      canonicalRequest: { action: 'scan', input: {}, context: {} },\n    } as any;\n\n    const result = await issueSpineIntent({ orgId: 'org_1', apiKey: 'key1', payload });\n\n    expect(result.ok).toBe(false);\n    expect(result.status).toBe(409);\n    expect(result.body.error).toContain('already consumed');\n  });\n});\n"},"tests/unit/gate/registry.test.ts":{"tests":[{"id":"114","name":"gate registry resolves risk-gate by default"},{"id":"115","name":"gate registry risk-gate returns BLOCK with proof_hash for high risk"},{"id":"116","name":"gate registry risk-gate returns ALLOW with proof_hash for low risk"},{"id":"117","name":"gate registry proof_hash is deterministic"},{"id":"118","name":"gate registry throws for unknown plugin id"}],"source":"import { describe, it, expect, afterEach, vi } from 'vitest';\n\ndescribe('gate registry', () => {\n  afterEach(() => {\n    delete process.env.DSG_GATE_PLUGIN;\n    delete process.env.DSG_CORE_MODE;\n    delete process.env.DSG_CORE_URL;\n    vi.resetModules();\n  });\n\n  it('resolves risk-gate by default', async () => {\n    process.env.DSG_CORE_MODE = 'internal';\n    const { resolveGate } = await import('../../../lib/gate');\n    const gate = resolveGate();\n    expect(gate.id).toBe('risk-gate');\n    expect(gate.verified).toBe(true);\n  });\n\n  it('risk-gate returns BLOCK with proof_hash for high risk', async () => {\n    process.env.DSG_CORE_MODE = 'internal';\n    const { resolveGate } = await import('../../../lib/gate');\n    const gate = resolveGate();\n    const result = await gate.evaluate({\n      agent_id: 'test',\n      action: 'scan',\n      payload: { context: { risk_score: 0.95 } },\n    });\n    expect(result.decision).toBe('BLOCK');\n    expect(result.proof_hash).toBeTruthy();\n    expect(typeof result.proof_hash).toBe('string');\n    expect(result.proof_hash!.length).toBe(64);\n    expect(result.source).toBe('internal');\n  });\n\n  it('risk-gate returns ALLOW with proof_hash for low risk', async () => {\n    process.env.DSG_CORE_MODE = 'internal';\n    const { resolveGate } = await import('../../../lib/gate');\n    const gate = resolveGate();\n    const result = await gate.evaluate({\n      agent_id: 'test',\n      action: 'scan',\n      payload: { context: { risk_score: 0.1 } },\n    });\n    expect(result.decision).toBe('ALLOW');\n    expect(result.proof_hash).toBeTruthy();\n  });\n\n  it('proof_hash is deterministic', async () => {\n    process.env.DSG_CORE_MODE = 'internal';\n    const { resolveGate } = await import('../../../lib/gate');\n    const gate = resolveGate();\n    const input = { agent_id: 'test', action: 'scan', payload: { context: { risk_score: 0.5 } } };\n    const a = await gate.evaluate(input);\n    const b = await gate.evaluate(input);\n    expect(a.proof_hash).toBe(b.proof_hash);\n  });\n\n  it('throws for unknown plugin id', async () => {\n    process.env.DSG_GATE_PLUGIN = 'nonexistent';\n    const { resolveGate } = await import('../../../lib/gate');\n    expect(() => resolveGate()).toThrow('not found');\n  });\n});\n"},"tests/unit/dsg-core.test.ts":{"tests":[{"id":"119","name":"dsg-core mode resolution throws when DSG_CORE_MODE is not explicit"},{"id":"120","name":"dsg-core mode resolution throws in remote mode when DSG_CORE_URL is missing"},{"id":"121","name":"dsg-core internal mode returns internal health in explicit internal mode"},{"id":"122","name":"dsg-core internal mode throws when internal mode execution omits risk score"},{"id":"123","name":"dsg-core internal mode uses internal runtime gate when risk score is provided"}],"source":"import { afterEach, describe, expect, it, vi } from 'vitest';\nimport { executeOnDSGCore, getDSGCoreHealth } from '../../lib/dsg-core';\n\ndescribe('dsg-core mode resolution', () => {\n  afterEach(() => {\n    delete process.env.DSG_CORE_URL;\n    delete process.env.DSG_CORE_MODE;\n    vi.unstubAllGlobals();\n    vi.restoreAllMocks();\n  });\n\n  it('throws when DSG_CORE_MODE is not explicit', async () => {\n    await expect(getDSGCoreHealth()).rejects.toThrow('DSG_CORE_MODE must be explicitly set');\n  });\n\n  it('throws in remote mode when DSG_CORE_URL is missing', async () => {\n    process.env.DSG_CORE_MODE = 'remote';\n\n    await expect(getDSGCoreHealth()).rejects.toThrow('DSG_CORE_URL is required when DSG_CORE_MODE=remote');\n  });\n});\n\ndescribe('dsg-core internal mode', () => {\n  afterEach(() => {\n    delete process.env.DSG_CORE_URL;\n    delete process.env.DSG_CORE_MODE;\n    vi.unstubAllGlobals();\n    vi.restoreAllMocks();\n  });\n\n  it('returns internal health in explicit internal mode', async () => {\n    process.env.DSG_CORE_MODE = 'internal';\n    vi.stubGlobal('fetch', vi.fn());\n\n    const health = await getDSGCoreHealth();\n    expect(health.ok).toBe(true);\n    expect((health as any).mode).toBe('internal');\n  });\n\n  it('throws when internal mode execution omits risk score', async () => {\n    process.env.DSG_CORE_MODE = 'internal';\n\n    await expect(\n      executeOnDSGCore({\n        agent_id: 'agent-1',\n        action: 'scan',\n        payload: { context: {} },\n      })\n    ).rejects.toThrow('requires payload.context.risk_score or payload.context.riskScore');\n  });\n\n  it('uses internal runtime gate when risk score is provided', async () => {\n    process.env.DSG_CORE_MODE = 'internal';\n\n    const result = await executeOnDSGCore({\n      agent_id: 'agent-1',\n      action: 'scan',\n      payload: { context: { risk_score: 0.92 } },\n    });\n\n    expect(result.decision).toBe('BLOCK');\n    expect(result.source).toBe('internal');\n    expect(result.policy_version).toBe('internal-runtime-gate-v1');\n  });\n});\n"},"tests/unit/playground/evaluate.test.ts":{"tests":[{"id":"124","name":"playground evaluate — gate integration ALLOW when risk_score is 0.1"},{"id":"125","name":"playground evaluate — gate integration STABILIZE when risk_score is 0.5"},{"id":"126","name":"playground evaluate — gate integration BLOCK when risk_score is 0.9"},{"id":"127","name":"playground evaluate — gate integration STABILIZE on oscillation pattern"},{"id":"128","name":"playground evaluate — gate integration ALLOW at exact boundary 0.39"},{"id":"129","name":"playground evaluate — gate integration STABILIZE at exact boundary 0.4"},{"id":"130","name":"playground evaluate — gate integration BLOCK at exact boundary 0.8"},{"id":"131","name":"playground evaluate — gate integration proof_hash is deterministic for same input"},{"id":"132","name":"playground evaluate — gate integration proof_hash differs for different risk_score"}],"source":"import { describe, it, expect } from 'vitest';\nimport { evaluateGate, detectOscillation } from '../../../lib/runtime/gate';\nimport { canonicalHash } from '../../../lib/runtime/canonical';\n\ndescribe('playground evaluate — gate integration', () => {\n  it('ALLOW when risk_score is 0.1', () => {\n    const result = evaluateGate({ riskScore: 0.1 });\n    expect(result.decision).toBe('ALLOW');\n  });\n\n  it('STABILIZE when risk_score is 0.5', () => {\n    const result = evaluateGate({ riskScore: 0.5 });\n    expect(result.decision).toBe('STABILIZE');\n  });\n\n  it('BLOCK when risk_score is 0.9', () => {\n    const result = evaluateGate({ riskScore: 0.9 });\n    expect(result.decision).toBe('BLOCK');\n  });\n\n  it('STABILIZE on oscillation pattern', () => {\n    const scores = [0.1, 0.6, 0.2, 0.58];\n    expect(detectOscillation(scores)).toBe(true);\n    const result = evaluateGate({ riskScore: 0.2, recentRiskScores: scores });\n    expect(result.decision).toBe('STABILIZE');\n  });\n\n  it('ALLOW at exact boundary 0.39', () => {\n    const result = evaluateGate({ riskScore: 0.39 });\n    expect(result.decision).toBe('ALLOW');\n  });\n\n  it('STABILIZE at exact boundary 0.4', () => {\n    const result = evaluateGate({ riskScore: 0.4 });\n    expect(result.decision).toBe('STABILIZE');\n  });\n\n  it('BLOCK at exact boundary 0.8', () => {\n    const result = evaluateGate({ riskScore: 0.8 });\n    expect(result.decision).toBe('BLOCK');\n  });\n\n  it('proof_hash is deterministic for same input', () => {\n    const input = { risk_score: 0.5, decision: 'STABILIZE', reason: 'test' };\n    expect(canonicalHash(input)).toBe(canonicalHash(input));\n  });\n\n  it('proof_hash differs for different risk_score', () => {\n    const a = canonicalHash({ risk_score: 0.3 });\n    const b = canonicalHash({ risk_score: 0.5 });\n    expect(a).not.toBe(b);\n  });\n});\n"},"tests/unit/dsg-core-remote-execution.test.ts":{"tests":[{"id":"133","name":"executeOnDSGCore in remote mode calls remote core /execute in remote mode"}],"source":"import { afterEach, describe, expect, it, vi } from 'vitest';\nimport { executeOnDSGCore } from '../../lib/dsg-core';\n\ndescribe('executeOnDSGCore in remote mode', () => {\n  afterEach(() => {\n    delete process.env.DSG_CORE_MODE;\n    delete process.env.DSG_CORE_URL;\n    vi.unstubAllGlobals();\n  });\n\n  it('calls remote core /execute in remote mode', async () => {\n    process.env.DSG_CORE_MODE = 'remote';\n    process.env.DSG_CORE_URL = 'https://core.example.com';\n\n    const fetchMock = vi.fn().mockResolvedValue({\n      ok: true,\n      json: async () => ({ ok: true, source: 'remote' }),\n    });\n    vi.stubGlobal('fetch', fetchMock as any);\n\n    const result = await executeOnDSGCore({\n      agent_id: 'agent-1',\n      action: 'run',\n      payload: { context: { risk_score: 0.2 } },\n    });\n\n    expect(fetchMock).toHaveBeenCalledWith(\n      'https://core.example.com/execute',\n      expect.objectContaining({ method: 'POST' })\n    );\n    expect((result as any).source).toBe('remote');\n  });\n});\n"},"tests/integration/api/execute-compat.test.ts":{"tests":[{"id":"134","name":"/api/execute compatibility route re-exports OPTIONS and POST from spine execute route"}],"source":"import { beforeEach, describe, expect, it, vi } from 'vitest';\n\ndescribe('/api/execute compatibility route', () => {\n  beforeEach(() => {\n    vi.resetModules();\n  });\n\n  it('re-exports OPTIONS and POST from spine execute route', async () => {\n    const OPTIONS = vi.fn();\n    const POST = vi.fn();\n\n    vi.doMock('../../../app/api/spine/execute/route', () => ({\n      OPTIONS,\n      POST,\n      dynamic: 'force-dynamic',\n    }));\n\n    const compatRoute = await import('../../../app/api/execute/route');\n\n    expect(compatRoute.OPTIONS).toBe(OPTIONS);\n    expect(compatRoute.POST).toBe(POST);\n    expect(compatRoute.dynamic).toBe('force-dynamic');\n  });\n});\n"},"tests/failure/replay-matrix.test.ts":{"tests":[{"id":"135","name":"runtime replay matrix 'high risk replay'"},{"id":"136","name":"runtime replay matrix 'mid risk replay'"},{"id":"137","name":"runtime replay matrix 'low risk replay'"},{"id":"138","name":"runtime replay matrix stabilizes oscillation edge case replay"}],"source":"import { evaluateGate } from '../../lib/runtime/gate';\n\nconst replayCases = [\n  { name: 'high risk replay', risk: 0.99, expected: 'BLOCK' },\n  { name: 'mid risk replay', risk: 0.55, expected: 'STABILIZE' },\n  { name: 'low risk replay', risk: 0.05, expected: 'ALLOW' },\n] as const;\n\ndescribe('runtime replay matrix', () => {\n  it.each(replayCases)('$name', ({ risk, expected }) => {\n    expect(evaluateGate({ riskScore: risk }).decision).toBe(expected);\n  });\n\n  it('stabilizes oscillation edge case replay', () => {\n    expect(evaluateGate({ riskScore: 0.2, recentRiskScores: [0.15, 0.6, 0.2, 0.58] }).decision).toBe('STABILIZE');\n  });\n});\n"},"tests/integration/api/execute.test.ts":{"tests":[{"id":"139","name":"/api/execute returns 401 when bearer token is missing"}],"source":"import { vi } from 'vitest';\n\ndescribe('/api/execute', () => {\n  it('returns 401 when bearer token is missing', async () => {\n    vi.resetModules();\n    const { POST } = await import('../../../app/api/execute/route');\n    const req = new Request('http://localhost/api/execute', {\n      method: 'POST',\n      body: JSON.stringify({ agent_id: 'a' }),\n    });\n\n    const res = await POST(req);\n    const body = await res.json();\n\n    expect(res.status).toBe(401);\n    expect(body).toEqual({ error: 'Missing Bearer token' });\n  }, 15_000);\n});\n"}},"projectRoot":"/home/user/tdealer01-crypto-dsg-control-plane","config":{"testRunner":"vitest","mutate":["lib/runtime/gate.ts","lib/spine/pipeline.ts","lib/ccvs/evidence-collector.ts","lib/ccvs/drift-detector.ts"],"checkers":[],"coverageAnalysis":"perTest","timeoutMS":30000,"timeoutFactor":2,"concurrency":2,"thresholds":{"high":90,"low":80,"break":70},"reporters":["html","json","progress"],"htmlReporter":

,"line":52},"start":{"column":10,"line":52}}},{"id":"199","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"expected '' to be 'ALLOW' // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["99"],"coveredBy":["39","99","100","102","104","116","124","128","137"],"location":{"end":{"column":29,"line":52},"start":{"column":22,"line":52}}},{"id":"200","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"expected '' to be truthy","status":"Killed","static":false,"testsCompleted":3,"killedBy":["102"],"coveredBy":["39","99","100","102","104","116","124","128","137"],"location":{"end":{"column":77,"line":52},"start":{"column":39,"line":52}}},{"id":"157","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"expected 'ALLOW' to be 'BLOCK' // Object.is equality","status":"Killed","static":true,"testsCompleted":1,"killedBy":["37"],"coveredBy":["112","113","114","115","116","117","118","139"],"location":{"end":{"column":2,"line":20},"start":{"column":36,"line":15}}}],"source":"export type GateDecision = 'ALLOW' | 'STABILIZE' | 'BLOCK';\n\nexport type GatePolicy = {\n  blockRiskScore: number;\n  stabilizeRiskScore: number;\n  oscillationWindow: number;\n  oscillationSpread: number;\n};\n\nexport type GateInput = {\n  riskScore: number;\n  recentRiskScores?: number[];\n};\n\nconst DEFAULT_POLICY: GatePolicy = {\n  blockRiskScore: 0.8,\n  stabilizeRiskScore: 0.4,\n  oscillationWindow: 4,\n  oscillationSpread: 0.35,\n};\n\nexport function detectOscillation(\n  recentRiskScores: number[] = [],\n  policy: GatePolicy = DEFAULT_POLICY\n): boolean {\n  if (recentRiskScores.length <"+" policy.oscillationWindow) {\n    return false;\n  }\n\n  const window = recentRiskScores.slice(-policy.oscillationWindow);\n  const min = Math.min(...window);\n  const max = Math.max(...window);\n  return max - min >= policy.oscillationSpread;\n}\n\nexport function evaluateGate(\n  input: GateInput,\n  policy: GatePolicy = DEFAULT_POLICY\n): { decision: GateDecision; reason: string } {\n  if (input.riskScore >= policy.blockRiskScore) {\n    return { decision: 'BLOCK', reason: 'risk score exceeded block threshold' };\n  }\n\n  if (detectOscillation(input.recentRiskScores, policy)) {\n    return { decision: 'STABILIZE', reason: 'risk oscillation window exceeded spread limit' };\n  }\n\n  if (input.riskScore >= policy.stabilizeRiskScore) {\n    return { decision: 'STABILIZE', reason: 'risk score exceeded stabilize threshold' };\n  }\n\n  return { decision: 'ALLOW', reason: 'risk score below stabilize threshold' };\n}\n"}},"schemaVersion":"1.0","thresholds":{"high":90,"low":80,"break":70},"testFiles":{"tests/integration/api/spine-execute.test.ts":{"tests":[{"id":"0","name":"/api/spine/execute returns preflight response for OPTIONS"},{"id":"1","name":"/api/spine/execute returns 401 when Bearer token is missing"},{"id":"2","name":"/api/spine/execute returns 400 when agent_id is missing"},{"id":"3","name":"/api/spine/execute returns 401 when agent_id and api key do not resolve"},{"id":"4","name":"/api/spine/execute executes successfully with valid agent credentials"},{"id":"5","name":"/api/spine/execute issues intent and retries execute when no pending runtime intent exists"},{"id":"6","name":"/api/spine/execute returns 402 when quota is exceeded"},{"id":"7","name":"/api/spine/execute returns 403 when agent is not active"}],"source":"import { beforeEach, describe, expect, it, vi } from 'vitest';\n\nfunction mockCors() {\n  const buildCorsHeaders = vi.fn(\n    (_request: Request, extraHeaders?: HeadersInit) =>\n      new Headers({\n        'access-control-allow-origin': 'https://app.example.com',\n        ...(extraHeaders instanceof Headers\n          ? Object.fromEntries(extraHeaders.entries())\n          : (extraHeaders as Record<"+"string, string> | undefined) || {}),\n      })\n  );\n\n  const buildPreflightResponse = vi.fn(\n    () =>\n      new Response(null, {\n        status: 204,\n        headers: {\n          'access-control-allow-origin': 'https://app.example.com',\n          'access-control-allow-methods': 'GET,POST,PUT,PATCH,DELETE,OPTIONS',\n        },\n      })\n  );\n\n  vi.doMock('../../../lib/security/cors', () => ({\n    buildCorsHeaders,\n    buildPreflightResponse,\n  }));\n\n  return { buildCorsHeaders, buildPreflightResponse };\n}\n\nfunction mockRateLimit() {\n  const applyRateLimit = vi.fn(async () => ({\n    allowed: true,\n    resetAt: Date.now() + 60_000,\n  }));\n  const buildRateLimitHeaders = vi.fn(() => ({\n    'x-ratelimit-limit': '60',\n  }));\n  const getRateLimitKey = vi.fn(() => 'spine-execute:test');\n\n  vi.doMock('../../../lib/security/rate-limit', () => ({\n    applyRateLimit,\n    buildRateLimitHeaders,\n    getRateLimitKey,\n  }));\n\n  return { applyRateLimit, buildRateLimitHeaders, getRateLimitKey };\n}\n\nfunction mockApiError() {\n  const handleApiError = vi.fn(\n    (_route: string, _error: unknown, options?: { headers?: HeadersInit }) =>\n      new Response(JSON.stringify({ error: 'Internal server error' }), {\n        status: 500,\n        headers: options?.headers,\n      })\n  );\n\n  vi.doMock('../../../lib/security/api-error', () => ({\n    handleApiError,\n  }));\n\n  return { handleApiError };\n}\n\nfunction mockQuota(allowed = true) {\n  const checkQuota = vi.fn(async () =>\n    allowed\n      ? { allowed: true, used: 0, limit: 10000 }\n      : { allowed: false, used: 10000, limit: 10000, upgradeUrl: 'https://app.dsg.pics/pricing' }\n  );\n  const incrementQuota = vi.fn(async () => undefined);\n\n  vi.doMock('../../../lib/usage/quota', () => ({\n    checkQuota,\n    incrementQuota,\n  }));\n\n  return { checkQuota, incrementQuota };\n}\n\ndescribe('/api/spine/execute', () => {\n  beforeEach(() => {\n    vi.resetModules();\n  });\n\n  it('returns preflight response for OPTIONS', async () => {\n    const { buildPreflightResponse } = mockCors();\n    mockRateLimit();\n    mockApiError();\n    mockQuota();\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      executeSpineIntent: vi.fn(),\n      issueSpineIntent: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(),\n    }));\n\n    const { OPTIONS } = await import('../../../app/api/spine/execute/route');\n\n    const req = new Request('http://localhost/api/spine/execute', {\n      method: 'OPTIONS',\n      headers: { origin: 'https://app.example.com' },\n    });\n\n    const res = await OPTIONS(req as never);\n\n    expect(res.status).toBe(204);\n    expect(res.headers.get('access-control-allow-origin')).toBe(\n      'https://app.example.com'\n    );\n    expect(buildPreflightResponse).toHaveBeenCalledOnce();\n  });\n\n  it('returns 401 when Bearer token is missing', async () => {\n    mockCors();\n    mockRateLimit();\n    mockApiError();\n    mockQuota();\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      executeSpineIntent: vi.fn(),\n      issueSpineIntent: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: 'agt_1',\n        action: 'scan',\n        input: {},\n        context: {},\n        canonicalRequest: { action: 'scan', input: {}, context: {} },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/spine/execute/route');\n\n    const req = new Request('http://localhost/api/spine/execute', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({ agent_id: 'agt_1' }),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(401);\n    expect(body).toEqual({ error: 'Missing Bearer token' });\n  });\n\n  it('returns 400 when agent_id is missing', async () => {\n    mockCors();\n    mockRateLimit();\n    mockApiError();\n    mockQuota();\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      executeSpineIntent: vi.fn(),\n      issueSpineIntent: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: '',\n        action: 'scan',\n        input: {},\n        context: {},\n        canonicalRequest: { action: 'scan', input: {}, context: {} },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/spine/execute/route');\n\n    const req = new Request('http://localhost/api/spine/execute', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        authorization: 'Bearer dsg_live_test',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({}),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(400);\n    expect(body).toEqual({ error: 'agent_id is required' });\n  });\n\n  it('returns 401 when agent_id and api key do not resolve', async () => {\n    mockCors();\n    mockRateLimit();\n    mockApiError();\n    mockQuota();\n\n    const resolveAgentFromApiKey = vi.fn(async () => null);\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey,\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      executeSpineIntent: vi.fn(),\n      issueSpineIntent: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: 'agt_1',\n        action: 'scan',\n        input: {},\n        context: {},\n        canonicalRequest: { action: 'scan', input: {}, context: {} },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/spine/execute/route');\n\n    const req = new Request('http://localhost/api/spine/execute', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        authorization: 'Bearer bad_key',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({ agent_id: 'agt_1' }),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(401);\n    expect(body).toEqual({ error: 'Invalid agent_id or API key' });\n    expect(resolveAgentFromApiKey).toHaveBeenCalledWith('agt_1', 'bad_key');\n  });\n\n  it('executes successfully with valid agent credentials', async () => {\n    mockCors();\n    mockRateLimit();\n    mockApiError();\n    const { incrementQuota } = mockQuota();\n\n    const resolveAgentFromApiKey = vi.fn(async () => ({\n      id: 'agt_1',\n      org_id: 'org_1',\n      status: 'active',\n    }));\n\n    const executeSpineIntent = vi.fn(async () => ({\n      ok: true,\n      status: 200,\n      body: { request_id: 'req_1', decision: 'ALLOW' },\n    }));\n\n    const issueSpineIntent = vi.fn();\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey,\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      executeSpineIntent,\n      issueSpineIntent,\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: 'agt_1',\n        action: 'scan',\n        input: { prompt: 'hello' },\n        context: {},\n        canonicalRequest: {\n          action: 'scan',\n          input: { prompt: 'hello' },\n          context: {},\n        },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/spine/execute/route');\n\n    const req = new Request('http://localhost/api/spine/execute', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        authorization: 'Bearer dsg_live_good',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({ agent_id: 'agt_1', input: { prompt: 'hello' } }),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(200);\n    expect(body).toEqual({ request_id: 'req_1', decision: 'ALLOW' });\n    expect(resolveAgentFromApiKey).toHaveBeenCalledWith('agt_1', 'dsg_live_good');\n    expect(executeSpineIntent).toHaveBeenCalledWith({\n      orgId: 'org_1',\n      apiKey: 'dsg_live_good',\n      payload: expect.objectContaining({ agentId: 'agt_1', action: 'scan' }),\n    });\n    expect(issueSpineIntent).not.toHaveBeenCalled();\n    // Quota counter incremented on success\n    expect(incrementQuota).toHaveBeenCalledWith('org_1', 'agt_1');\n  });\n\n  it('issues intent and retries execute when no pending runtime intent exists', async () => {\n    mockCors();\n    mockRateLimit();\n    mockApiError();\n    mockQuota();\n\n    const resolveAgentFromApiKey = vi.fn(async () => ({\n      id: 'agt_1',\n      org_id: 'org_1',\n      status: 'active',\n    }));\n\n    const executeSpineIntent = vi\n      .fn()\n      .mockResolvedValueOnce({\n        ok: false,\n        status: 409,\n        body: { error: 'No pending runtime intent for request' },\n      })\n      .mockResolvedValueOnce({\n        ok: true,\n        status: 200,\n        body: { request_id: 'req_2', decision: 'ALLOW' },\n      });\n\n    const issueSpineIntent = vi.fn(async () => ({\n      ok: true,\n      status: 200,\n      body: { request_id: 'intent_1' },\n    }));\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey,\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      executeSpineIntent,\n      issueSpineIntent,\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: 'agt_1',\n        action: 'scan',\n        input: { prompt: 'retry me' },\n        context: {},\n        canonicalRequest: {\n          action: 'scan',\n          input: { prompt: 'retry me' },\n          context: {},\n        },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/spine/execute/route');\n\n    const req = new Request('http://localhost/api/spine/execute', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        authorization: 'Bearer dsg_live_good',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({ agent_id: 'agt_1', input: { prompt: 'retry me' } }),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(200);\n    expect(body).toEqual({ request_id: 'req_2', decision: 'ALLOW' });\n    expect(issueSpineIntent).toHaveBeenCalledOnce();\n    expect(executeSpineIntent).toHaveBeenCalledTimes(2);\n  });\n\n  it('returns 402 when quota is exceeded', async () => {\n    mockCors();\n    mockRateLimit();\n    mockApiError();\n    const { checkQuota } = mockQuota(false); // quota exceeded\n\n    const resolveAgentFromApiKey = vi.fn(async () => ({\n      id: 'agt_1',\n      org_id: 'org_1',\n      status: 'active',\n    }));\n    const executeSpineIntent = vi.fn();\n    const issueSpineIntent = vi.fn();\n\n    vi.doMock('../../../lib/agent-auth', () => ({ resolveAgentFromApiKey }));\n    vi.doMock('../../../lib/spine/engine', () => ({ executeSpineIntent, issueSpineIntent }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: 'agt_1',\n        action: 'scan',\n        input: {},\n        context: {},\n        canonicalRequest: { action: 'scan', input: {}, context: {} },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/spine/execute/route');\n\n    const req = new Request('http://localhost/api/spine/execute', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        authorization: 'Bearer dsg_live_good',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({ agent_id: 'agt_1' }),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(402);\n    expect(body.error).toMatch(/quota exceeded/i);\n    expect(body.upgrade_url).toContain('/pricing');\n    // Spine engine should NOT be called when quota is exceeded\n    expect(executeSpineIntent).not.toHaveBeenCalled();\n    expect(checkQuota).toHaveBeenCalledWith('org_1', 'agt_1');\n  });\n\n  it('returns 403 when agent is not active', async () => {\n    mockCors();\n    mockRateLimit();\n    mockApiError();\n    mockQuota();\n\n    const resolveAgentFromApiKey = vi.fn(async () => ({\n      id: 'agt_1',\n      org_id: 'org_1',\n      status: 'suspended',\n    }));\n\n    vi.doMock('../../../lib/agent-auth', () => ({ resolveAgentFromApiKey }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      executeSpineIntent: vi.fn(),\n      issueSpineIntent: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: 'agt_1',\n        action: 'scan',\n        input: {},\n        context: {},\n        canonicalRequest: { action: 'scan', input: {}, context: {} },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/spine/execute/route');\n\n    const req = new Request('http://localhost/api/spine/execute', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        authorization: 'Bearer dsg_live_good',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({ agent_id: 'agt_1' }),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(403);\n    expect(body.error).toMatch(/not active/i);\n  });\n});\n"},"tests/integration/api/intent.test.ts":{"tests":[{"id":"8","name":"/api/intent returns preflight response for OPTIONS"},{"id":"9","name":"/api/intent returns 401 when Bearer token is missing"},{"id":"10","name":"/api/intent returns 400 when agent_id is missing"},{"id":"11","name":"/api/intent returns 401 when agent_id and api key do not resolve"},{"id":"12","name":"/api/intent issues runtime intent with resolved org_id"}],"source":"import { beforeEach, describe, expect, it, vi } from 'vitest';\n\nfunction mockCors() {\n  const buildCorsHeaders = vi.fn(\n    (_request: Request, extraHeaders?: HeadersInit) =>\n      new Headers({\n        'access-control-allow-origin': 'https://app.example.com',\n        ...(extraHeaders instanceof Headers\n          ? Object.fromEntries(extraHeaders.entries())\n          : (extraHeaders as Record<"+"string, string> | undefined) || {}),\n      })\n  );\n\n  const buildPreflightResponse = vi.fn(\n    () =>\n      new Response(null, {\n        status: 204,\n        headers: {\n          'access-control-allow-origin': 'https://app.example.com',\n        },\n      })\n  );\n\n  vi.doMock('../../../lib/security/cors', () => ({\n    buildCorsHeaders,\n    buildPreflightResponse,\n  }));\n\n  return { buildCorsHeaders, buildPreflightResponse };\n}\n\nfunction mockApiError() {\n  const handleApiError = vi.fn(\n    (_route: string, _error: unknown, options?: { headers?: HeadersInit }) =>\n      new Response(JSON.stringify({ error: 'Internal server error' }), {\n        status: 500,\n        headers: options?.headers,\n      })\n  );\n\n  vi.doMock('../../../lib/security/api-error', () => ({\n    handleApiError,\n  }));\n\n  return { handleApiError };\n}\n\ndescribe('/api/intent', () => {\n  beforeEach(() => {\n    vi.resetModules();\n  });\n\n  it('returns preflight response for OPTIONS', async () => {\n    const { buildPreflightResponse } = mockCors();\n    mockApiError();\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      issueSpineIntent: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(),\n    }));\n\n    const { OPTIONS } = await import('../../../app/api/intent/route');\n\n    const req = new Request('http://localhost/api/intent', {\n      method: 'OPTIONS',\n      headers: { origin: 'https://app.example.com' },\n    });\n\n    const res = await OPTIONS(req as never);\n\n    expect(res.status).toBe(204);\n    expect(buildPreflightResponse).toHaveBeenCalledOnce();\n  });\n\n  it('returns 401 when Bearer token is missing', async () => {\n    mockCors();\n    mockApiError();\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      issueSpineIntent: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: 'agt_1',\n        action: 'scan',\n        input: {},\n        context: {},\n        canonicalRequest: { action: 'scan', input: {}, context: {} },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/intent/route');\n\n    const req = new Request('http://localhost/api/intent', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({ agent_id: 'agt_1' }),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(401);\n    expect(body).toEqual({ error: 'Missing Bearer token' });\n  });\n\n  it('returns 400 when agent_id is missing', async () => {\n    mockCors();\n    mockApiError();\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      issueSpineIntent: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: '',\n        action: 'scan',\n        input: {},\n        context: {},\n        canonicalRequest: { action: 'scan', input: {}, context: {} },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/intent/route');\n\n    const req = new Request('http://localhost/api/intent', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        authorization: 'Bearer dsg_live_test',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({}),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(400);\n    expect(body).toEqual({ error: 'agent_id is required' });\n  });\n\n  it('returns 401 when agent_id and api key do not resolve', async () => {\n    mockCors();\n    mockApiError();\n\n    const resolveAgentFromApiKey = vi.fn(async () => null);\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey,\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      issueSpineIntent: vi.fn(),\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: 'agt_1',\n        action: 'scan',\n        input: {},\n        context: {},\n        canonicalRequest: { action: 'scan', input: {}, context: {} },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/intent/route');\n\n    const req = new Request('http://localhost/api/intent', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        authorization: 'Bearer bad_key',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({ agent_id: 'agt_1' }),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(401);\n    expect(body).toEqual({ error: 'Invalid agent_id or API key' });\n    expect(resolveAgentFromApiKey).toHaveBeenCalledWith('agt_1', 'bad_key');\n  });\n\n  it('issues runtime intent with resolved org_id', async () => {\n    mockCors();\n    mockApiError();\n\n    const resolveAgentFromApiKey = vi.fn(async () => ({\n      id: 'agt_1',\n      org_id: 'org_1',\n      status: 'active',\n    }));\n\n    const issueSpineIntent = vi.fn(async () => ({\n      ok: true,\n      status: 200,\n      body: { request_id: 'intent_1', status: 'pending' },\n    }));\n\n    vi.doMock('../../../lib/agent-auth', () => ({\n      resolveAgentFromApiKey,\n    }));\n    vi.doMock('../../../lib/spine/engine', () => ({\n      issueSpineIntent,\n    }));\n    vi.doMock('../../../lib/spine/request', () => ({\n      normalizeSpinePayload: vi.fn(() => ({\n        agentId: 'agt_1',\n        action: 'scan',\n        input: { prompt: 'hello' },\n        context: {},\n        canonicalRequest: {\n          action: 'scan',\n          input: { prompt: 'hello' },\n          context: {},\n        },\n      })),\n    }));\n\n    const { POST } = await import('../../../app/api/intent/route');\n\n    const req = new Request('http://localhost/api/intent', {\n      method: 'POST',\n      headers: {\n        origin: 'https://app.example.com',\n        authorization: 'Bearer dsg_live_good',\n        'content-type': 'application/json',\n      },\n      body: JSON.stringify({ agent_id: 'agt_1', input: { prompt: 'hello' } }),\n    });\n\n    const res = await POST(req as never);\n    const body = await res.json();\n\n    expect(res.status).toBe(200);\n    expect(body).toEqual({ request_id: 'intent_1', status: 'pending' });\n    expect(issueSpineIntent).toHaveBeenCalledWith({\n      orgId: 'org_1',\n      apiKey: 'dsg_live_good',\n      payload: expect.objectContaining({ agentId: 'agt_1', action: 'scan' }),\n    });\n  });\n});\n"},"tests/integration/api/execute-critical-path.test.ts":{"tests":[{"id":"13","name":"/api/execute critical route contract returns 401 when bearer token is missing"},{"id":"14","name":"/api/execute critical route contract returns 400 when agent_id is missing"},{"id":"15","name":"/api/execute critical route contract returns 401 when agent_id and api key do not resolve"},{"id":"16","name":"/api/execute critical route contract returns 403 when the agent is not active"},{"id":"17","name":"/api/execute critical route contract executes active agent request and returns the spine engine body"},{"id":"18","name":"/api/execute critical route contract issues a runtime intent and retries when no pending runtime intent exists"},{"id":"19","name":"/api/execute critical route contract returns 429 and rate-limit headers when rate limit blocks the request"}],"source":"import { beforeEach, describe, expect, it, vi } from 'vitest';\n\nconst {\n  resolveAgentFromApiKeyMock,\n  executeSpineIntentMock,\n  issueSpineIntentMock,\n  applyRateLimitMock,\n  checkQuotaMock,\n  incrementQuotaMock,\n} = vi.hoisted(() => ({\n  resolveAgentFromApiKeyMock: vi.fn(),\n  executeSpineIntentMock: vi.fn(),\n  issueSpineIntentMock: vi.fn(),\n  applyRateLimitMock: vi.fn(),\n  checkQuotaMock: vi.fn(),\n  incrementQuotaMock: vi.fn(),\n}));\n\nvi.mock('../../../lib/agent-auth', () => ({\n  resolveAgentFromApiKey: resolveAgentFromApiKeyMock,\n}));\n\nvi.mock('../../../lib/spine/engine', () => ({\n  executeSpineIntent: executeSpineIntentMock,\n  issueSpineIntent: issueSpineIntentMock,\n}));\n\nvi.mock('../../../lib/security/rate-limit', () => ({\n  applyRateLimit: applyRateLimitMock,\n  buildRateLimitHeaders: (rateLimit: { remaining?: number; reset?: number }, limit: number) => ({\n    'x-ratelimit-limit': String(limit),\n    'x-ratelimit-remaining': String(rateLimit.remaining ?? limit),\n    'x-ratelimit-reset': String(rateLimit.reset ?? Date.now() + 60_000),\n  }),\n  getRateLimitKey: () => 'test-rate-key',\n}));\n\nvi.mock('../../../lib/usage/quota', () => ({\n  checkQuota: checkQuotaMock,\n  incrementQuota: incrementQuotaMock,\n}));\n\nfunction request(body: unknown, headers: Record<"+"string, string> = {}) {\n  return new Request('http://localhost/api/execute', {\n    method: 'POST',\n    headers: {\n      'content-type': 'application/json',\n      ...headers,\n    },\n    body: JSON.stringify(body),\n  });\n}\n\nasync function loadPost() {\n  vi.resetModules();\n  const mod = await import('../../../app/api/execute/route');\n  return mod.POST;\n}\n\ndescribe('/api/execute critical route contract', () => {\n  beforeEach(() => {\n    vi.clearAllMocks();\n    applyRateLimitMock.mockResolvedValue({ allowed: true, remaining: 59, reset: Date.now() + 60_000 });\n    checkQuotaMock.mockResolvedValue({ allowed: true, used: 0, limit: 10000 });\n    incrementQuotaMock.mockResolvedValue(undefined);\n    resolveAgentFromApiKeyMock.mockResolvedValue({\n      id: 'agent-test',\n      org_id: 'org-test',\n      policy_id: 'policy-test',\n      status: 'active',\n      monthly_limit: 1000,\n    });\n    executeSpineIntentMock.mockResolvedValue({\n      ok: true,\n      status: 200,\n      body: {\n        request_id: 'exec-test-1',\n        decision: 'ALLOW',\n        reason: 'test allowed',\n        latency_ms: 12,\n        policy_version: 'v1',\n      },\n    });\n    issueSpineIntentMock.mockResolvedValue({\n      ok: true,\n      status: 200,\n      body: { request_id: 'approval-test-1', status: 'pending' },\n    });\n  });\n\n  it('returns 401 when bearer token is missing', async () => {\n    const POST = await loadPost();\n\n    const res = await POST(request({ agent_id: 'agent-test', input: 'hello' }));\n    const body = await res.json();\n\n    expect(res.status).toBe(401);\n    expect(body).toEqual({ error: 'Missing Bearer token' });\n    expect(resolveAgentFromApiKeyMock).not.toHaveBeenCalled();\n  });\n\n  it('returns 400 when agent_id is missing', async () => {\n    const POST = await loadPost();\n\n    const res = await POST(request({ input: 'hello' }, { authorization: 'Bearer sk_test_valid' }));\n    const body = await res.json();\n\n    expect(res.status).toBe(400);\n    expect(body).toEqual({ error: 'agent_id is required' });\n  });\n\n  it('returns 401 when agent_id and api key do not resolve', async () => {\n    resolveAgentFromApiKeyMock.mockResolvedValueOnce(null);\n    const POST = await loadPost();\n\n    const res = await POST(request({ agent_id: 'agent-test', input: 'hello' }, { authorization: 'Bearer sk_test_bad' }));\n    const body = await res.json();\n\n    expect(res.status).toBe(401);\n    expect(body).toEqual({ error: 'Invalid agent_id or API key' });\n  });\n\n  it('returns 403 when the agent is not active', async () => {\n    resolveAgentFromApiKeyMock.mockResolvedValueOnce({\n      id: 'agent-test',\n      org_id: 'org-test',\n      policy_id: 'policy-test',\n      status: 'revoked',\n      monthly_limit: 1000,\n    });\n    const POST = await loadPost();\n\n    const res = await POST(request({ agent_id: 'agent-test', input: 'hello' }, { authorization: 'Bearer sk_test_valid' }));\n    const body = await res.json();\n\n    expect(res.status).toBe(403);\n    expect(body).toEqual({ error: 'Agent is not active' });\n  });\n\n  it('executes active agent request and returns the spine engine body', async () => {\n    const POST = await loadPost();\n\n    const res = await POST(\n      request(\n        {\n          agent_id: 'agent-test',\n          action: 'send_email',\n          input: { to: 'user@example.com', subject: 'Hello' },\n          context: { source: 'vitest' },\n        },\n        { authorization: 'Bearer sk_test_valid' },\n      ),\n    );\n    const body = await res.json();\n\n    expect(res.status).toBe(200);\n    expect(body.decision).toBe('ALLOW');\n    expect(resolveAgentFromApiKeyMock).toHaveBeenCalledWith('agent-test', 'sk_test_valid');\n    expect(executeSpineIntentMock).toHaveBeenCalledWith(\n      expect.objectContaining({\n        orgId: 'org-test',\n        apiKey: 'sk_test_valid',\n        payload: expect.objectContaining({ agentId: 'agent-test' }),\n      }),\n    );\n  });\n\n  it('issues a runtime intent and retries when no pending runtime intent exists', async () => {\n    executeSpineIntentMock\n      .mockResolvedValueOnce({ ok: false, status: 409, body: { error: 'No pending runtime intent for request' } })\n      .mockResolvedValueOnce({ ok: true, status: 200, body: { request_id: 'exec-after-issue', decision: 'ALLOW' } });\n    const POST = await loadPost();\n\n    const res = await POST(request({ agent_id: 'agent-test', input: 'hello' }, { authorization: 'Bearer sk_test_valid' }));\n    const body = await res.json();\n\n    expect(res.status).toBe(200);\n    expect(body.request_id).toBe('exec-after-issue');\n    expect(issueSpineIntentMock).toHaveBeenCalledOnce();\n    expect(executeSpineIntentMock).toHaveBeenCalledTimes(2);\n  });\n\n  it('returns 429 and rate-limit headers when rate limit blocks the request', async () => {\n    applyRateLimitMock.mockResolvedValueOnce({ allowed: false, remaining: 0, reset: Date.now() + 60_000 });\n    const POST = await loadPost();\n\n    const res = await POST(request({ agent_id: 'agent-test', input: 'hello' }, { authorization: 'Bearer sk_test_valid' }));\n    const body = await res.json();\n\n    expect(res.status).toBe(429);\n    expect(body).toEqual({ error: 'Too many requests' });\n    expect(res.headers.get('x-ratelimit-remaining')).toBe('0');\n    expect(resolveAgentFromApiKeyMock).not.toHaveBeenCalled();\n  });\n});\n"},"tests/unit/ccvs/drift-detector.test.ts":{"tests":[{"id":"20","name":"buildDriftSnapshot includes policy_version from env"},{"id":"21","name":"buildDriftSnapshot hash_algorithm is sha256"},{"id":"22","name":"buildDriftSnapshot deployment_config_hash changes when GITHUB_SHA changes"},{"id":"23","name":"buildDriftSnapshot captured_at is a valid ISO date"},{"id":"24","name":"buildDriftSnapshot deployment_config_hash starts with sha256: followed by 64 hex chars"},{"id":"25","name":"buildDriftSnapshot deployment_config_hash is same whether NEXT_PUBLIC_SUPABASE_URL is unset or empty string"},{"id":"26","name":"buildDriftSnapshot deployment_config_hash is same whether DSG_CONTROL_PLANE_BASE_URL is unset or empty string"},{"id":"27","name":"buildDriftSnapshot deployment_config_hash is same whether VERCEL_GIT_COMMIT_SHA is unset or empty string"},{"id":"28","name":"detectDrift — no previous changed=false when previous is null"},{"id":"29","name":"detectDrift — with previous detects policy_version change"},{"id":"30","name":"detectDrift — with previous detects deployment_config_hash change"},{"id":"31","name":"detectDrift — with previous detects hash_algorithm change"},{"id":"32","name":"detectDrift — with previous no change when snapshots are identical except captured_at"},{"id":"33","name":"detectDrift — with previous invalidated_attestations is deduplicated"},{"id":"34","name":"snapshotHash is deterministic for the same snapshot content"},{"id":"35","name":"snapshotHash changes when policy_version changes"},{"id":"36","name":"snapshotHash is prefixed with sha256:"}],"source":"import { describe, it, expect, beforeEach, afterEach } from 'vitest';\nimport { buildDriftSnapshot, detectDrift, snapshotHash } from '../../../lib/ccvs/drift-detector';\n\ndescribe('buildDriftSnapshot', () => {\n  const savedEnv = { ...process.env };\n\n  beforeEach(() => {\n    process.env.GITHUB_SHA = 'abc1234';\n    process.env.DSG_POLICY_VERSION = 'v1';\n  });\n\n  afterEach(() => {\n    Object.assign(process.env, savedEnv);\n  });\n\n  it('includes policy_version from env', () => {\n    const snap = buildDriftSnapshot();\n    expect(snap.policy_version).toBe('v1');\n  });\n\n  it('hash_algorithm is sha256', () => {\n    const snap = buildDriftSnapshot();\n    expect(snap.hash_algorithm).toBe('sha256');\n  });\n\n  it('deployment_config_hash changes when GITHUB_SHA changes', () => {\n    const snap1 = buildDriftSnapshot();\n    process.env.GITHUB_SHA = 'xyz9999';\n    const snap2 = buildDriftSnapshot();\n    expect(snap1.deployment_config_hash).not.toBe(snap2.deployment_config_hash);\n  });\n\n  it('captured_at is a valid ISO date', () => {\n    const snap = buildDriftSnapshot();\n    expect(new Date(snap.captured_at).toISOString()).toBe(snap.captured_at);\n  });\n\n  it('deployment_config_hash starts with sha256: followed by 64 hex chars', () => {\n    const snap = buildDriftSnapshot();\n    expect(snap.deployment_config_hash).toMatch(/^sha256:[a-f0-9]{64}$/);\n  });\n\n  it('deployment_config_hash is same whether NEXT_PUBLIC_SUPABASE_URL is unset or empty string', () => {\n    const saved = process.env.NEXT_PUBLIC_SUPABASE_URL;\n    delete process.env.NEXT_PUBLIC_SUPABASE_URL;\n    const hash1 = buildDriftSnapshot().deployment_config_hash;\n    process.env.NEXT_PUBLIC_SUPABASE_URL = '';\n    const hash2 = buildDriftSnapshot().deployment_config_hash;\n    expect(hash1).toBe(hash2);\n    if (saved !== undefined) process.env.NEXT_PUBLIC_SUPABASE_URL = saved;\n    else delete process.env.NEXT_PUBLIC_SUPABASE_URL;\n  });\n\n  it('deployment_config_hash is same whether DSG_CONTROL_PLANE_BASE_URL is unset or empty string', () => {\n    const saved = process.env.DSG_CONTROL_PLANE_BASE_URL;\n    delete process.env.DSG_CONTROL_PLANE_BASE_URL;\n    const hash1 = buildDriftSnapshot().deployment_config_hash;\n    process.env.DSG_CONTROL_PLANE_BASE_URL = '';\n    const hash2 = buildDriftSnapshot().deployment_config_hash;\n    expect(hash1).toBe(hash2);\n    if (saved !== undefined) process.env.DSG_CONTROL_PLANE_BASE_URL = saved;\n    else delete process.env.DSG_CONTROL_PLANE_BASE_URL;\n  });\n\n  it('deployment_config_hash is same whether VERCEL_GIT_COMMIT_SHA is unset or empty string', () => {\n    const saved = process.env.VERCEL_GIT_COMMIT_SHA;\n    delete process.env.VERCEL_GIT_COMMIT_SHA;\n    const hash1 = buildDriftSnapshot().deployment_config_hash;\n    process.env.VERCEL_GIT_COMMIT_SHA = '';\n    const hash2 = buildDriftSnapshot().deployment_config_hash;\n    expect(hash1).toBe(hash2);\n    if (saved !== undefined) process.env.VERCEL_GIT_COMMIT_SHA = saved;\n    else delete process.env.VERCEL_GIT_COMMIT_SHA;\n  });\n});\n\ndescribe('detectDrift — no previous', () => {\n  it('changed=false when previous is null', () => {\n    const current = buildDriftSnapshot();\n    const report = detectDrift(null, current);\n    expect(report.changed).toBe(false);\n    expect(report.fields_changed).toHaveLength(0);\n    expect(report.invalidated_attestations).toHaveLength(0);\n  });\n});\n\ndescribe('detectDrift — with previous', () => {\n  it('detects policy_version change', () => {\n    const prev = buildDriftSnapshot({ policy_version: 'v1' });\n    const curr = buildDriftSnapshot({ policy_version: 'v2' });\n    const report = detectDrift(prev, curr);\n    expect(report.changed).toBe(true);\n    expect(report.fields_changed).toContain('policy_version');\n    expect(report.invalidated_attestations).toContain('all_compliance_attestations');\n    expect(report.invalidated_attestations).toContain('all_evidence_envelopes');\n  });\n\n  it('detects deployment_config_hash change', () => {\n    const prev = buildDriftSnapshot({ deployment_config_hash: 'sha256:' + 'a'.repeat(64) });\n    const curr = buildDriftSnapshot({ deployment_config_hash: 'sha256:' + 'b'.repeat(64) });\n    const report = detectDrift(prev, curr);\n    expect(report.changed).toBe(true);\n    expect(report.fields_changed).toContain('deployment_config_hash');\n    expect(report.invalidated_attestations).toContain('deployment_provenance');\n  });\n\n  it('detects hash_algorithm change', () => {\n    const prev = buildDriftSnapshot();\n    const curr = { ...prev, hash_algorithm: 'sha512', captured_at: new Date().toISOString() };\n    const report = detectDrift(prev, curr);\n    expect(report.changed).toBe(true);\n    expect(report.fields_changed).toContain('hash_algorithm');\n    expect(report.invalidated_attestations).toContain('all_integrity_hashes');\n  });\n\n  it('no change when snapshots are identical except captured_at', () => {\n    const prev = buildDriftSnapshot();\n    const curr = { ...prev, captured_at: new Date(Date.now() + 1000).toISOString() };\n    const report = detectDrift(prev, curr);\n    expect(report.changed).toBe(false);\n  });\n\n  it('invalidated_attestations is deduplicated', () => {\n    const prev = buildDriftSnapshot({ policy_version: 'v1', schema_version: '1.0.0' });\n    const curr = buildDriftSnapshot({ policy_version: 'v2', schema_version: '2.0.0' });\n    const report = detectDrift(prev, curr);\n    const unique = new Set(report.invalidated_attestations);\n    expect(report.invalidated_attestations.length).toBe(unique.size);\n  });\n});\n\ndescribe('snapshotHash', () => {\n  it('is deterministic for the same snapshot content', () => {\n    const snap = buildDriftSnapshot({ policy_version: 'v1', schema_version: '1.0.0' });\n    const h1 = snapshotHash(snap);\n    const h2 = snapshotHash({ ...snap, captured_at: new Date(Date.now() + 5000).toISOString() });\n    expect(h1).toBe(h2);\n  });\n\n  it('changes when policy_version changes', () => {\n    const snap1 = buildDriftSnapshot({ policy_version: 'v1' });\n    const snap2 = buildDriftSnapshot({ policy_version: 'v2' });\n    expect(snapshotHash(snap1)).not.toBe(snapshotHash(snap2));\n  });\n\n  it('is prefixed with sha256:', () => {\n    const snap = buildDriftSnapshot();\n    expect(snapshotHash(snap)).toMatch(/^sha256:[a-f0-9]{64}$/);\n  });\n});\n"},"tests/unit/spine/pipeline-block.test.ts":{"tests":[{"id":"37","name":"evaluateGate — decision boundaries BLOCK when riskScore >= 0.8"},{"id":"38","name":"evaluateGate — decision boundaries STABILIZE when riskScore >= 0.4 but <"+" 0.8"},{"id":"39","name":"evaluateGate — decision boundaries ALLOW when riskScore <"+" 0.4 and no oscillation"},{"id":"40","name":"evaluateGate — decision boundaries STABILIZE on oscillation even with low riskScore"},{"id":"41","name":"evaluateGate — decision boundaries no oscillation when window too small"},{"id":"42","name":"evaluateGate — decision boundaries oscillation when spread >= 0.35 in last 4 scores"},{"id":"43","name":"evaluateGate — decision boundaries no oscillation when spread <"+" 0.35"},{"id":"44","name":"runPipeline — gate BLOCK short-circuits arbiters returns BLOCK from gate and skips arbiters"},{"id":"45","name":"runPipeline — gate BLOCK short-circuits arbiters ALLOW from gate lets arbiter escalate to STABILIZE"}],"source":"import { describe, it, expect } from 'vitest';\nimport { evaluateGate, detectOscillation } from '../../../lib/runtime/gate';\nimport { registry } from '../../../lib/spine/plugin';\nimport type { DSGPlugin } from '../../../lib/spine/plugin';\nimport type { PluginInput, PluginOutput } from '../../../lib/spine/types';\n\ndescribe('evaluateGate — decision boundaries', () => {\n  it('BLOCK when riskScore >= 0.8', () => {\n    expect(evaluateGate({ riskScore: 0.8 }).decision).toBe('BLOCK');\n    expect(evaluateGate({ riskScore: 0.95 }).decision).toBe('BLOCK');\n    expect(evaluateGate({ riskScore: 1.0 }).decision).toBe('BLOCK');\n  });\n\n  it('STABILIZE when riskScore >= 0.4 but <"+" 0.8', () => {\n    expect(evaluateGate({ riskScore: 0.4 }).decision).toBe('STABILIZE');\n    expect(evaluateGate({ riskScore: 0.79 }).decision).toBe('STABILIZE');\n  });\n\n  it('ALLOW when riskScore <"+" 0.4 and no oscillation', () => {\n    expect(evaluateGate({ riskScore: 0.1 }).decision).toBe('ALLOW');\n    expect(evaluateGate({ riskScore: 0.39 }).decision).toBe('ALLOW');\n  });\n\n  it('STABILIZE on oscillation even with low riskScore', () => {\n    const result = evaluateGate({\n      riskScore: 0.1,\n      recentRiskScores: [0.1, 0.6, 0.15, 0.55],\n    });\n    expect(result.decision).toBe('STABILIZE');\n    expect(result.reason).toContain('oscillation');\n  });\n\n  it('no oscillation when window too small', () => {\n    expect(detectOscillation([0.1, 0.9])).toBe(false);\n    expect(detectOscillation([])).toBe(false);\n  });\n\n  it('oscillation when spread >= 0.35 in last 4 scores', () => {\n    expect(detectOscillation([0.1, 0.5, 0.1, 0.5])).toBe(true);\n  });\n\n  it('no oscillation when spread <"+" 0.35', () => {\n    expect(detectOscillation([0.1, 0.2, 0.15, 0.25])).toBe(false);\n  });\n});\n\ndescribe('runPipeline — gate BLOCK short-circuits arbiters', () => {\n  it('returns BLOCK from gate and skips arbiters', async () => {\n    const blockGate: DSGPlugin = {\n      id: 'test-block-gate',\n      name: 'Test Block Gate',\n      kind: 'gate',\n      verification: { verified: true, solver: null, properties: [] },\n      health: async () => ({ ok: true }),\n      evaluate: async (): Promise<"+"PluginOutput> => ({\n        decision: 'BLOCK',\n        reason: 'test:HIGH_RISK',\n        policy_version: 'test-v1',\n        latency_ms: 1,\n        proof: { proof_hash: 'block-proof', proof_version: 'v1', theorem_set_id: null, solver: null },\n        metrics: {},\n      }),\n    };\n\n    const arbiterCalled = { called: false };\n    const testArbiter: DSGPlugin = {\n      id: 'test-arbiter',\n      name: 'Test Arbiter',\n      kind: 'arbiter',\n      verification: { verified: true, solver: null, properties: [] },\n      health: async () => ({ ok: true }),\n      evaluate: async (): Promise<"+"PluginOutput> => {\n        arbiterCalled.called = true;\n        return {\n          decision: 'ALLOW', reason: 'ok', policy_version: 'v1', latency_ms: 0,\n          proof: { proof_hash: null, proof_version: null, theorem_set_id: null, solver: null },\n          metrics: {},\n        };\n      },\n    };\n\n    registry.registerIfAbsent(blockGate);\n    registry.registerIfAbsent(testArbiter);\n\n    const originalEnv = process.env.DSG_SPINE_GATE_PLUGIN;\n    process.env.DSG_SPINE_GATE_PLUGIN = 'test-block-gate';\n\n    try {\n      const input: PluginInput = {\n        org_id: 'org_1',\n        agent_id: 'agt_1',\n        action: 'dangerous-action',\n        payload: {},\n        truth_state: null,\n        approval: null,\n        spine: { request_id: 'req_1', received_at: new Date().toISOString(), billing_period: '2026-04' },\n      };\n\n      const { runPipeline } = await import('../../../lib/spine/pipeline');\n      const result = await runPipeline(input);\n\n      expect(result.final_decision).toBe('BLOCK');\n      expect(result.final_reason).toBe('test:HIGH_RISK');\n      expect(result.stages).toHaveLength(1);\n      expect(result.stages[0].plugin_id).toBe('test-block-gate');\n      expect(result.proof.proof_hash).toBe('block-proof');\n      expect(arbiterCalled.called).toBe(false);\n    } finally {\n      if (originalEnv === undefined) delete process.env.DSG_SPINE_GATE_PLUGIN;\n      else process.env.DSG_SPINE_GATE_PLUGIN = originalEnv;\n    }\n  });\n\n  it('ALLOW from gate lets arbiter escalate to STABILIZE', async () => {\n    const allowGate: DSGPlugin = {\n      id: 'test-allow-gate',\n      name: 'Test Allow Gate',\n      kind: 'gate',\n      verification: { verified: true, solver: null, properties: [] },\n      health: async () => ({ ok: true }),\n      evaluate: async (): Promise<"+"PluginOutput> => ({\n        decision: 'ALLOW', reason: 'gate:OK', policy_version: 'v1', latency_ms: 1,\n        proof: { proof_hash: null, proof_version: null, theorem_set_id: null, solver: null },\n        metrics: {},\n      }),\n    };\n\n    const stabilizeArbiter: DSGPlugin = {\n      id: 'test-stabilize-arbiter',\n      name: 'Test Stabilize Arbiter',\n      kind: 'arbiter',\n      verification: { verified: true, solver: null, properties: [] },\n      health: async () => ({ ok: true }),\n      evaluate: async (): Promise<"+"PluginOutput> => ({\n        decision: 'STABILIZE', reason: 'arbiter:OSCILLATION', policy_version: 'v1', latency_ms: 2,\n        proof: { proof_hash: 'stab-proof', proof_version: 'v1', theorem_set_id: null, solver: null },\n        metrics: {},\n      }),\n    };\n\n    registry.registerIfAbsent(allowGate);\n    registry.registerIfAbsent(stabilizeArbiter);\n\n    const originalEnv = process.env.DSG_SPINE_GATE_PLUGIN;\n    process.env.DSG_SPINE_GATE_PLUGIN = 'test-allow-gate';\n\n    try {\n      const { runPipeline } = await import('../../../lib/spine/pipeline');\n      const result = await runPipeline({\n        org_id: 'org_1', agent_id: 'agt_1', action: 'scan', payload: {},\n        truth_state: null, approval: null,\n        spine: { request_id: 'req_2', received_at: new Date().toISOString(), billing_period: '2026-04' },\n      });\n\n      expect(result.final_decision).toBe('STABILIZE');\n      expect(result.authoritative_plugin_id).toBe('test-stabilize-arbiter');\n      expect(result.stages.length).toBeGreaterThanOrEqual(2);\n    } finally {\n      if (originalEnv === undefined) delete process.env.DSG_SPINE_GATE_PLUGIN;\n      else process.env.DSG_SPINE_GATE_PLUGIN = originalEnv;\n    }\n  });\n});\n"},"tests/integration/api/health-route.test.ts":{"tests":[{"id":"46","name":"GET /api/health returns a response with ok field"},{"id":"47","name":"GET /api/health response shape includes service, timestamp, db_ok, core_ok, rateLimiter, core, readiness"},{"id":"48","name":"GET /api/health returns 200 when all checks pass"},{"id":"49","name":"GET /api/health returns 503 when db is unreachable"},{"id":"50","name":"GET /api/health returns 503 when rate limiter is not configured"}],"source":"import { describe, it, expect, vi, beforeEach } from 'vitest';\n\n// Shared mock factories\nfunction makeSupabaseMock(dbError: unknown = null) {\n  return {\n    getSupabaseAdmin: vi.fn(() => ({\n      from: vi.fn(() => ({\n        select: vi.fn().mockReturnThis(),\n        limit: vi.fn().mockResolvedValue({ data: dbError ? null : [{ id: 'org-1' }], error: dbError }),\n      })),\n    })),\n  };\n}\n\nfunction makeReadinessMock(ok: boolean) {\n  return {\n    getDeploymentReadiness: vi.fn(async () => ({\n      ok,\n      checks: {\n        env: { ok },\n        nextAuthSecret: { ok },\n        supabaseServiceRole: { ok },\n        dsgCoreConfig: { ok },\n        dsgCoreHealth: { ok },\n        financeGovernanceSurface: { ok },\n        financeGovernanceBackend: { ok },\n      },\n      timestamp: new Date().toISOString(),\n    })),\n  };\n}\n\nfunction makeDsgCoreMock(ok: boolean) {\n  return {\n    getDSGCoreHealth: vi.fn(async () => ({\n      ok,\n      status: ok ? 'healthy' : 'degraded',\n      version: '1.0.0',\n      timestamp: new Date().toISOString(),\n      ...(ok ? {} : { error: 'core_unreachable' }),\n    })),\n  };\n}\n\ndescribe('GET /api/health', () => {\n  beforeEach(() => {\n    vi.resetModules();\n  });\n\n  it('returns a response with ok field', async () => {\n    vi.doMock('../../../lib/supabase-server', () => makeSupabaseMock());\n    vi.doMock('../../../lib/deployment/readiness', () => makeReadinessMock(true));\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, error: unknown) => {\n        const msg = error instanceof Error ? error.message : 'unknown';\n        return Response.json({ error: msg }, { status: 500 });\n      }),\n    }));\n    vi.doMock('../../../lib/security/rate-limit', () => ({\n      isRateLimiterConfigured: vi.fn(() => true),\n    }));\n\n    const { GET } = await import('../../../app/api/health/route');\n    const res = await GET();\n    const body = await res.json();\n\n    expect(typeof body.ok).toBe('boolean');\n  });\n\n  it('response shape includes service, timestamp, db_ok, core_ok, rateLimiter, core, readiness', async () => {\n    vi.doMock('../../../lib/supabase-server', () => makeSupabaseMock());\n    vi.doMock('../../../lib/deployment/readiness', () => makeReadinessMock(true));\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, error: unknown) => {\n        const msg = error instanceof Error ? error.message : 'unknown';\n        return Response.json({ error: msg }, { status: 500 });\n      }),\n    }));\n    vi.doMock('../../../lib/security/rate-limit', () => ({\n      isRateLimiterConfigured: vi.fn(() => true),\n    }));\n\n    const { GET } = await import('../../../app/api/health/route');\n    const res = await GET();\n    const body = await res.json();\n\n    expect(body.service).toBe('dsg-control-plane');\n    expect(typeof body.timestamp).toBe('string');\n    expect(typeof body.db_ok).toBe('boolean');\n    expect(typeof body.core_ok).toBe('boolean');\n    expect(typeof body.rateLimiter).toBe('object');\n    expect(typeof body.core).toBe('object');\n    expect(typeof body.readiness).toBe('object');\n  });\n\n  it('returns 200 when all checks pass', async () => {\n    vi.doMock('../../../lib/supabase-server', () => makeSupabaseMock());\n    vi.doMock('../../../lib/deployment/readiness', () => makeReadinessMock(true));\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, error: unknown) => {\n        const msg = error instanceof Error ? error.message : 'unknown';\n        return Response.json({ error: msg }, { status: 500 });\n      }),\n    }));\n    vi.doMock('../../../lib/security/rate-limit', () => ({\n      isRateLimiterConfigured: vi.fn(() => true),\n    }));\n\n    const { GET } = await import('../../../app/api/health/route');\n    const res = await GET();\n\n    expect(res.status).toBe(200);\n  });\n\n  it('returns 503 when db is unreachable', async () => {\n    vi.doMock('../../../lib/supabase-server', () => makeSupabaseMock({ message: 'connection refused' }));\n    vi.doMock('../../../lib/deployment/readiness', () => makeReadinessMock(true));\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, error: unknown) => {\n        const msg = error instanceof Error ? error.message : 'unknown';\n        return Response.json({ error: msg }, { status: 500 });\n      }),\n    }));\n    vi.doMock('../../../lib/security/rate-limit', () => ({\n      isRateLimiterConfigured: vi.fn(() => true),\n    }));\n\n    const { GET } = await import('../../../app/api/health/route');\n    const res = await GET();\n    const body = await res.json();\n\n    expect(res.status).toBe(503);\n    expect(body.db_ok).toBe(false);\n  });\n\n  it('returns 503 when rate limiter is not configured', async () => {\n    vi.doMock('../../../lib/supabase-server', () => makeSupabaseMock());\n    vi.doMock('../../../lib/deployment/readiness', () => makeReadinessMock(true));\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, error: unknown) => {\n        const msg = error instanceof Error ? error.message : 'unknown';\n        return Response.json({ error: msg }, { status: 500 });\n      }),\n    }));\n    vi.doMock('../../../lib/security/rate-limit', () => ({\n      isRateLimiterConfigured: vi.fn(() => false),\n    }));\n\n    const { GET } = await import('../../../app/api/health/route');\n    const res = await GET();\n    const body = await res.json();\n\n    expect(res.status).toBe(503);\n    expect(body.rateLimiter.ok).toBe(false);\n  });\n});\n"},"tests/unit/ccvs/evidence-collector.test.ts":{"tests":[{"id":"51","name":"buildEvidenceEnvelope produces schema_version 1.0.0"},{"id":"52","name":"buildEvidenceEnvelope sets severity_level from evidence type"},{"id":"53","name":"buildEvidenceEnvelope assigns severity 1 to unit, 2 to integration, 3 to adversarial, 5 to provenance"},{"id":"54","name":"buildEvidenceEnvelope chain_hash is prefixed with sha256:"},{"id":"55","name":"buildEvidenceEnvelope chain_hash changes when metrics change"},{"id":"56","name":"buildEvidenceEnvelope carries previous_chain_hash when supplied"},{"id":"57","name":"buildEvidenceEnvelope sets expires_at when ttlSeconds provided"},{"id":"58","name":"buildEvidenceEnvelope stores nonce when provided"},{"id":"59","name":"buildEvidenceEnvelope includes sbom_ref when provided"},{"id":"60","name":"buildEvidenceEnvelope generated_at is a valid ISO date"},{"id":"61","name":"verifyEnvelopeIntegrity returns ok=true for a freshly built envelope"},{"id":"62","name":"verifyEnvelopeIntegrity returns ok=false when chain_hash is tampered"},{"id":"63","name":"verifyEnvelopeIntegrity returns ok=false when metrics are tampered"},{"id":"64","name":"verifyEnvelopeIntegrity expected hash matches chain_hash for a valid envelope"},{"id":"65","name":"buildRunContextFromEnv reads repo and commit from env"},{"id":"66","name":"buildRunContextFromEnv builds invocation_id from run_id + attempt"},{"id":"67","name":"buildOIDCFromEnv builds sub from repo + ref"},{"id":"68","name":"buildOIDCFromEnv uses provided audience"}],"source":"import { describe, it, expect, beforeEach, afterEach } from 'vitest';\nimport {\n  buildEvidenceEnvelope,\n  verifyEnvelopeIntegrity,\n  buildRunContextFromEnv,\n  buildOIDCFromEnv,\n  EVIDENCE_SEVERITY,\n} from '../../../lib/ccvs/evidence-collector';\nimport type { CollectorOptions, EvidenceRunContext, EvidenceOIDC } from '../../../lib/ccvs/evidence-collector';\n\nconst testRun: EvidenceRunContext = {\n  repo: 'org/repo',\n  commit: 'abc1234',\n  ref: 'refs/heads/main',\n  workflow_run_id: '999',\n  builder_id: 'https://github.com/actions/runner',\n  invocation_id: '999-1',\n};\n\nconst testOIDC: EvidenceOIDC = {\n  issuer: 'https://token.actions.githubusercontent.com',\n  audience: 'ccvs-evidence',\n  sub: 'repo:org/repo:ref:refs/heads/main',\n};\n\nconst baseOpts: CollectorOptions = {\n  evidenceType: 'unit',\n  subjects: [{ name: 'repo:org/repo', digest: { sha1: 'abc1234' } }],\n  run: testRun,\n  oidc: testOIDC,\n  metrics: { tests_total: 50, tests_passed: 50, tests_failed: 0 },\n};\n\ndescribe('buildEvidenceEnvelope', () => {\n  it('produces schema_version 1.0.0', () => {\n    const env = buildEvidenceEnvelope(baseOpts);\n    expect(env.schema_version).toBe('1.0.0');\n  });\n\n  it('sets severity_level from evidence type', () => {\n    const env = buildEvidenceEnvelope({ ...baseOpts, evidenceType: 'mutation' });\n    expect(env.severity_level).toBe(EVIDENCE_SEVERITY['mutation']);\n    expect(env.severity_level).toBe(4);\n  });\n\n  it('assigns severity 1 to unit, 2 to integration, 3 to adversarial, 5 to provenance', () => {\n    expect(buildEvidenceEnvelope({ ...baseOpts, evidenceType: 'unit' }).severity_level).toBe(1);\n    expect(buildEvidenceEnvelope({ ...baseOpts, evidenceType: 'integration' }).severity_level).toBe(2);\n    expect(buildEvidenceEnvelope({ ...baseOpts, evidenceType: 'adversarial' }).severity_level).toBe(3);\n    expect(buildEvidenceEnvelope({ ...baseOpts, evidenceType: 'provenance' }).severity_level).toBe(5);\n  });\n\n  it('chain_hash is prefixed with sha256:', () => {\n    const env = buildEvidenceEnvelope(baseOpts);\n    expect(env.integrity.chain_hash).toMatch(/^sha256:[a-f0-9]{64}$/);\n  });\n\n  it('chain_hash changes when metrics change', () => {\n    const a = buildEvidenceEnvelope({ ...baseOpts, metrics: { tests_passed: 10 } });\n    const b = buildEvidenceEnvelope({ ...baseOpts, metrics: { tests_passed: 11 } });\n    expect(a.integrity.chain_hash).not.toBe(b.integrity.chain_hash);\n  });\n\n  it('carries previous_chain_hash when supplied', () => {\n    const prev = 'sha256:' + 'a'.repeat(64);\n    const env = buildEvidenceEnvelope({ ...baseOpts, previousChainHash: prev });\n    expect(env.integrity.previous_chain_hash).toBe(prev);\n  });\n\n  it('sets expires_at when ttlSeconds provided', () => {\n    const env = buildEvidenceEnvelope({ ...baseOpts, ttlSeconds: 3600 });\n    expect(env.expires_at).toBeDefined();\n    expect(new Date(env.expires_at!).getTime()).toBeGreaterThan(Date.now());\n  });\n\n  it('stores nonce when provided', () => {\n    const env = buildEvidenceEnvelope({ ...baseOpts, nonce: 'test-nonce-xyz' });\n    expect(env.nonce).toBe('test-nonce-xyz');\n  });\n\n  it('includes sbom_ref when provided', () => {\n    const env = buildEvidenceEnvelope({ ...baseOpts, sbomRef: 'sbom.cyclonedx.json' });\n    expect(env.integrity.sbom_ref).toBe('sbom.cyclonedx.json');\n  });\n\n  it('generated_at is a valid ISO date', () => {\n    const env = buildEvidenceEnvelope(baseOpts);\n    expect(new Date(env.generated_at).toISOString()).toBe(env.generated_at);\n  });\n});\n\ndescribe('verifyEnvelopeIntegrity', () => {\n  it('returns ok=true for a freshly built envelope', () => {\n    const env = buildEvidenceEnvelope(baseOpts);\n    expect(verifyEnvelopeIntegrity(env).ok).toBe(true);\n  });\n\n  it('returns ok=false when chain_hash is tampered', () => {\n    const env = buildEvidenceEnvelope(baseOpts);\n    const tampered = { ...env, integrity: { ...env.integrity, chain_hash: 'sha256:' + 'b'.repeat(64) } };\n    expect(verifyEnvelopeIntegrity(tampered).ok).toBe(false);\n  });\n\n  it('returns ok=false when metrics are tampered', () => {\n    const env = buildEvidenceEnvelope(baseOpts);\n    const tampered = { ...env, metrics: { tests_passed: 999, tests_failed: 0 } };\n    expect(verifyEnvelopeIntegrity(tampered).ok).toBe(false);\n  });\n\n  it('expected hash matches chain_hash for a valid envelope', () => {\n    const env = buildEvidenceEnvelope(baseOpts);\n    const { ok, expected } = verifyEnvelopeIntegrity(env);\n    expect(ok).toBe(true);\n    expect(expected).toBe(env.integrity.chain_hash);\n  });\n});\n\ndescribe('buildRunContextFromEnv', () => {\n  const savedEnv = { ...process.env };\n\n  beforeEach(() => {\n    process.env.GITHUB_REPOSITORY = 'test-org/test-repo';\n    process.env.GITHUB_SHA = 'def5678';\n    process.env.GITHUB_RUN_ID = '12345';\n    process.env.GITHUB_RUN_ATTEMPT = '1';\n  });\n\n  afterEach(() => {\n    Object.assign(process.env, savedEnv);\n  });\n\n  it('reads repo and commit from env', () => {\n    const ctx = buildRunContextFromEnv();\n    expect(ctx.repo).toBe('test-org/test-repo');\n    expect(ctx.commit).toBe('def5678');\n  });\n\n  it('builds invocation_id from run_id + attempt', () => {\n    const ctx = buildRunContextFromEnv();\n    expect(ctx.invocation_id).toBe('12345-1');\n  });\n});\n\ndescribe('buildOIDCFromEnv', () => {\n  const savedEnv = { ...process.env };\n\n  beforeEach(() => {\n    process.env.GITHUB_REPOSITORY = 'test-org/test-repo';\n    process.env.GITHUB_REF = 'refs/heads/feature';\n  });\n\n  afterEach(() => {\n    Object.assign(process.env, savedEnv);\n  });\n\n  it('builds sub from repo + ref', () => {\n    const oidc = buildOIDCFromEnv();\n    expect(oidc.sub).toBe('repo:test-org/test-repo:ref:refs/heads/feature');\n  });\n\n  it('uses provided audience', () => {\n    const oidc = buildOIDCFromEnv('custom-audience');\n    expect(oidc.audience).toBe('custom-audience');\n  });\n});\n"},"tests/integration/api/audit-route.test.ts":{"tests":[{"id":"69","name":"GET /api/audit returns 401 when not authenticated"},{"id":"70","name":"GET /api/audit returns 403 when role is insufficient"},{"id":"71","name":"GET /api/audit returns 200 with ok, items, and determinism fields when authorized"},{"id":"72","name":"GET /api/audit items array contains audit events"},{"id":"73","name":"GET /api/audit limit query param caps results at 100"},{"id":"74","name":"GET /api/audit returns core_ok field reflecting audit events state"}],"source":"import { describe, it, expect, vi, beforeEach } from 'vitest';\n\nconst SAMPLE_AUDIT_ITEMS = [\n  { id: 'evt-1', action: 'execute', sequence: 1, created_at: '2025-01-01T00:00:00Z' },\n  { id: 'evt-2', action: 'approve', sequence: 2, created_at: '2025-01-02T00:00:00Z' },\n];\n\nfunction makeDsgCoreMock(ok = true) {\n  return {\n    getDSGCoreAuditEvents: vi.fn(async () => ({\n      ok,\n      items: ok ? SAMPLE_AUDIT_ITEMS : [],\n      error: ok ? undefined : 'core_unreachable',\n    })),\n    getDSGCoreDeterminism: vi.fn(async (_seq: number) => ({\n      ok: true,\n      data: { sequence: _seq, hash: 'abc123', verified: true },\n    })),\n  };\n}\n\nfunction makeRuntimeAccessMock(result: { ok: boolean; status?: number; error?: string; orgId?: string }) {\n  return {\n    requireRuntimeAccess: vi.fn(async () =>\n      result.ok\n        ? { ok: true, orgId: result.orgId ?? 'org-1', grantedRoles: ['monitor'], actorType: 'user' as const }\n        : { ok: false, status: result.status ?? 401, error: result.error ?? 'Unauthorized' }\n    ),\n  };\n}\n\ndescribe('GET /api/audit', () => {\n  beforeEach(() => {\n    vi.resetModules();\n  });\n\n  it('returns 401 when not authenticated', async () => {\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/authz-runtime', () => makeRuntimeAccessMock({ ok: false, status: 401, error: 'Unauthorized' }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      internalErrorMessage: vi.fn(() => 'Internal server error'),\n      logApiError: vi.fn(),\n    }));\n\n    const { GET } = await import('../../../app/api/audit/route');\n    const req = new Request('http://localhost/api/audit', { method: 'GET' });\n    const res = await GET(req);\n    const body = await res.json();\n\n    expect(res.status).toBe(401);\n    expect(body.error).toBeTruthy();\n  });\n\n  it('returns 403 when role is insufficient', async () => {\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/authz-runtime', () => makeRuntimeAccessMock({ ok: false, status: 403, error: 'Insufficient role' }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      internalErrorMessage: vi.fn(() => 'Internal server error'),\n      logApiError: vi.fn(),\n    }));\n\n    const { GET } = await import('../../../app/api/audit/route');\n    const req = new Request('http://localhost/api/audit', { method: 'GET' });\n    const res = await GET(req);\n    const body = await res.json();\n\n    expect(res.status).toBe(403);\n    expect(body.error).toBeTruthy();\n  });\n\n  it('returns 200 with ok, items, and determinism fields when authorized', async () => {\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/authz-runtime', () => makeRuntimeAccessMock({ ok: true, orgId: 'org-1' }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      internalErrorMessage: vi.fn(() => 'Internal server error'),\n      logApiError: vi.fn(),\n    }));\n\n    const { GET } = await import('../../../app/api/audit/route');\n    const req = new Request('http://localhost/api/audit', { method: 'GET' });\n    const res = await GET(req);\n    const body = await res.json();\n\n    expect(res.status).toBe(200);\n    expect(typeof body.ok).toBe('boolean');\n    expect(Array.isArray(body.items)).toBe(true);\n    expect(Array.isArray(body.determinism)).toBe(true);\n  });\n\n  it('items array contains audit events', async () => {\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/authz-runtime', () => makeRuntimeAccessMock({ ok: true, orgId: 'org-1' }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      internalErrorMessage: vi.fn(() => 'Internal server error'),\n      logApiError: vi.fn(),\n    }));\n\n    const { GET } = await import('../../../app/api/audit/route');\n    const req = new Request('http://localhost/api/audit', { method: 'GET' });\n    const res = await GET(req);\n    const body = await res.json();\n\n    expect(body.items.length).toBe(SAMPLE_AUDIT_ITEMS.length);\n    expect(body.items[0].id).toBe('evt-1');\n  });\n\n  it('limit query param caps results at 100', async () => {\n    const auditMock = vi.fn(async (limit: number) => ({\n      ok: true,\n      items: Array.from({ length: limit }, (_, i) => ({ id: `evt-${i}`, sequence: i })),\n      error: undefined,\n    }));\n\n    vi.doMock('../../../lib/dsg-core', () => ({\n      getDSGCoreAuditEvents: auditMock,\n      getDSGCoreDeterminism: vi.fn(async () => ({ ok: true, data: {} })),\n    }));\n    vi.doMock('../../../lib/authz-runtime', () => makeRuntimeAccessMock({ ok: true, orgId: 'org-1' }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      internalErrorMessage: vi.fn(() => 'Internal server error'),\n      logApiError: vi.fn(),\n    }));\n\n    const { GET } = await import('../../../app/api/audit/route');\n    // Requesting 200 but route caps at 100\n    const req = new Request('http://localhost/api/audit?limit=200', { method: 'GET' });\n    await GET(req);\n\n    expect(auditMock).toHaveBeenCalledWith(100, expect.objectContaining({ orgId: 'org-1' }));\n  });\n\n  it('returns core_ok field reflecting audit events state', async () => {\n    vi.doMock('../../../lib/dsg-core', () => makeDsgCoreMock(true));\n    vi.doMock('../../../lib/authz-runtime', () => makeRuntimeAccessMock({ ok: true, orgId: 'org-1' }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      internalErrorMessage: vi.fn(() => 'Internal server error'),\n      logApiError: vi.fn(),\n    }));\n\n    const { GET } = await import('../../../app/api/audit/route');\n    const req = new Request('http://localhost/api/audit', { method: 'GET' });\n    const res = await GET(req);\n    const body = await res.json();\n\n    expect(typeof body.core_ok).toBe('boolean');\n    expect(body.core_ok).toBe(true);\n  });\n});\n"},"tests/unit/agent/executor-hermes.test.ts":{"tests":[{"id":"75","name":"read tools execute directly without hermes gate"},{"id":"76","name":"approval check blocks without approval token"},{"id":"77","name":"hermes gate on write tool PASS and executes when proof is present"},{"id":"78","name":"hermes gate on write tool BLOCK when proof is missing"},{"id":"79","name":"browser_navigate maps to browser_qa mode PASS with proof"},{"id":"80","name":"browser_navigate maps to browser_qa mode PASS without proof (observe-no-audit fast path)"},{"id":"81","name":"preflight blocks BLOCK when tool prompt implies .env access"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { executeToolSafely } from \"../../../lib/agent/executor\";\nimport type { AgentContext } from \"../../../lib/agent/context\";\nimport type { AgentTool } from \"../../../lib/agent/tools\";\n\nvi.mock(\"../../../lib/gate\", () => ({\n  resolveGate: () => ({\n    evaluate: async () => ({ decision: \"PASS\", reason: \"ok\" }),\n  }),\n}));\n\nconst REAL_PROOF = {\n  audit: {\n    preAuditEventId: \"audit_evt_001\",\n    ledgerId: \"ledger_001\",\n    chainHeadHash: \"chain_hash_001\",\n  },\n  evidence: {\n    evidenceManifestId: \"manifest_001\",\n    policySnapshotHash: \"policy_hash_001\",\n  },\n};\n\nconst BASE_CONTEXT: AgentContext = {\n  orgId: \"org_test\",\n  role: \"operator\",\n  origin: \"http://localhost:3000\",\n  authHeader: \"Bearer test-token\",\n  cookieHeader: \"\",\n  approvalToken: \"approved-by-user-token-ok\",\n};\n\nconst WRITE_TOOL: AgentTool = {\n  id: \"checkpoint\",\n  name: \"Create Runtime Checkpoint\",\n  description: \"checkpoint\",\n  parameters: { agent_id: { type: \"string\", required: true, description: \"agent id\" } },\n  riskLevel: \"write\",\n  requiredRole: \"checkpoint\",\n  execute: async () => ({ ok: true, checkpointId: \"cp_001\" }),\n};\n\nconst READ_TOOL: AgentTool = {\n  id: \"readiness\",\n  name: \"Check Readiness\",\n  description: \"readiness\",\n  parameters: {},\n  riskLevel: \"read\",\n  requiredRole: \"monitor\",\n  execute: async () => ({ ready: true }),\n};\n\nconst BROWSER_TOOL: AgentTool = {\n  id: \"browser_navigate\",\n  name: \"Browser Navigate\",\n  description: \"browser\",\n  parameters: {\n    agent_id: { type: \"string\", required: true, description: \"agent\" },\n    url: { type: \"string\", required: true, description: \"url\" },\n  },\n  riskLevel: \"critical\",\n  requiredRole: \"execute\",\n  execute: async () => ({ navigated: true }),\n};\n\n// ─── read tools bypass hermes entirely ──────────────────────────────────────\n\ndescribe(\"read tools\", () => {\n  it(\"execute directly without hermes gate\", async () => {\n    const result = await executeToolSafely(READ_TOOL, {}, BASE_CONTEXT);\n    expect(result).toEqual({ ready: true });\n  });\n});\n\n// ─── approval check ──────────────────────────────────────────────────────────\n\ndescribe(\"approval check\", () => {\n  it(\"blocks without approval token\", async () => {\n    const ctx = { ...BASE_CONTEXT, approvalToken: undefined };\n    const result = await executeToolSafely(WRITE_TOOL, { agent_id: \"ag_001\" }, ctx) as Record<"+"string, unknown>;\n    expect(result.blocked).toBe(true);\n    expect(result.requiresApproval).toBe(true);\n  });\n});\n\n// ─── hermes gate — write tool with proof ────────────────────────────────────\n\ndescribe(\"hermes gate on write tool\", () => {\n  it(\"PASS and executes when proof is present\", async () => {\n    const ctx = { ...BASE_CONTEXT, hermesProof: REAL_PROOF };\n    const result = await executeToolSafely(WRITE_TOOL, { agent_id: \"ag_001\" }, ctx) as Record<"+"string, unknown>;\n    expect(result.blocked).toBeUndefined();\n    expect(result.ok).toBe(true);\n  });\n\n  it(\"BLOCK when proof is missing\", async () => {\n    const ctx = { ...BASE_CONTEXT, hermesProof: undefined };\n    const result = await executeToolSafely(WRITE_TOOL, { agent_id: \"ag_001\" }, ctx) as Record<"+"string, unknown>;\n    expect(result.blocked).toBe(true);\n    expect(result.hermesDecision).toBe(\"BLOCK\");\n    expect(String(result.reason)).toContain(\"DSG Hermes gate\");\n    console.log(\"\\n--- write tool BLOCK (no proof) ---\");\n    console.log(\"hermesStatus:\", result.hermesStatus);\n    console.log(\"reasons:\", result.reasons);\n  });\n});\n\n// ─── hermes gate — browser_navigate maps to browser_qa ──────────────────────\n\ndescribe(\"browser_navigate maps to browser_qa mode\", () => {\n  it(\"PASS with proof\", async () => {\n    const ctx = { ...BASE_CONTEXT, role: \"org_admin\" as const, hermesProof: REAL_PROOF };\n    const result = await executeToolSafely(\n      BROWSER_TOOL,\n      { agent_id: \"ag_001\", url: \"/proofgate\" },\n      ctx,\n    ) as Record<"+"string, unknown>;\n    expect(result.blocked).toBeUndefined();\n    expect(result.navigated).toBe(true);\n    console.log(\"\\n--- browser_navigate PASS (browser_qa mode) ---\");\n  });\n\n  it(\"PASS without proof (observe-no-audit fast path)\", async () => {\n    const ctx = { ...BASE_CONTEXT, role: \"org_admin\" as const };\n    const result = await executeToolSafely(\n      BROWSER_TOOL,\n      { agent_id: \"ag_001\", url: \"/proofgate\" },\n      ctx,\n    ) as Record<"+"string, unknown>;\n    // observe mode passes without proof — no mutation risk\n    expect(result.blocked).toBeUndefined();\n    expect(result.navigated).toBe(true);\n    console.log(\"\\n--- browser_navigate PASS (no proof, observe fast path) ---\");\n  });\n});\n\n// ─── preflight block passes through from hermes ──────────────────────────────\n\ndescribe(\"preflight blocks\", () => {\n  it(\"BLOCK when tool prompt implies .env access\", async () => {\n    const sensitiveEnvTool: AgentTool = {\n      ...WRITE_TOOL,\n      id: \"local_operator\",\n      name: \"cat .env.production\",\n    };\n    const ctx = { ...BASE_CONTEXT, hermesProof: REAL_PROOF };\n    const result = await executeToolSafely(\n      sensitiveEnvTool,\n      { agent_id: \"ag_001\" },\n      ctx,\n    ) as Record<"+"string, unknown>;\n    expect(result.blocked).toBe(true);\n    expect(String(result.reason)).toContain(\"Hermes may not read\");\n    console.log(\"\\n--- preflight .env BLOCK via executor ---\");\n    console.log(\"reason:\", result.reason);\n  });\n});\n"},"tests/integration/api/readiness-route.test.ts":{"tests":[{"id":"82","name":"GET /api/readiness returns 200 with ok:true when all checks pass"},{"id":"83","name":"GET /api/readiness returns 503 with ok:false when any check fails"},{"id":"84","name":"GET /api/readiness response body matches ReadinessReport shape with checks and timestamp"},{"id":"85","name":"GET /api/readiness checks object contains expected keys"},{"id":"86","name":"GET /api/readiness returns 500 when getDeploymentReadiness throws"}],"source":"import { describe, it, expect, vi, beforeEach } from 'vitest';\n\nconst PASSING_READINESS = {\n  ok: true,\n  checks: {\n    env: { ok: true },\n    nextAuthSecret: { ok: true },\n    supabaseServiceRole: { ok: true },\n    dsgCoreConfig: { ok: true },\n    dsgCoreHealth: { ok: true },\n    financeGovernanceSurface: { ok: true },\n    financeGovernanceBackend: { ok: true },\n  },\n  timestamp: new Date().toISOString(),\n};\n\nconst FAILING_READINESS = {\n  ok: false,\n  checks: {\n    env: { ok: false, detail: 'NEXT_PUBLIC_SUPABASE_URL not set' },\n    nextAuthSecret: { ok: false, detail: 'missing' },\n    supabaseServiceRole: { ok: false, detail: 'missing' },\n    dsgCoreConfig: { ok: false, detail: 'missing' },\n    dsgCoreHealth: { ok: false, detail: 'unreachable' },\n    financeGovernanceSurface: { ok: false, detail: 'missing' },\n    financeGovernanceBackend: { ok: false, detail: 'missing' },\n  },\n  timestamp: new Date().toISOString(),\n};\n\ndescribe('GET /api/readiness', () => {\n  beforeEach(() => {\n    vi.resetModules();\n  });\n\n  it('returns 200 with ok:true when all checks pass', async () => {\n    vi.doMock('../../../lib/deployment/readiness', () => ({\n      getDeploymentReadiness: vi.fn(async () => PASSING_READINESS),\n    }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, error: unknown) => {\n        const msg = error instanceof Error ? error.message : 'unknown';\n        return Response.json({ error: msg }, { status: 500 });\n      }),\n    }));\n\n    const { GET } = await import('../../../app/api/readiness/route');\n    const res = await GET();\n    const body = await res.json();\n\n    expect(res.status).toBe(200);\n    expect(body.ok).toBe(true);\n  });\n\n  it('returns 503 with ok:false when any check fails', async () => {\n    vi.doMock('../../../lib/deployment/readiness', () => ({\n      getDeploymentReadiness: vi.fn(async () => FAILING_READINESS),\n    }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, error: unknown) => {\n        const msg = error instanceof Error ? error.message : 'unknown';\n        return Response.json({ error: msg }, { status: 500 });\n      }),\n    }));\n\n    const { GET } = await import('../../../app/api/readiness/route');\n    const res = await GET();\n    const body = await res.json();\n\n    expect(res.status).toBe(503);\n    expect(body.ok).toBe(false);\n  });\n\n  it('response body matches ReadinessReport shape with checks and timestamp', async () => {\n    vi.doMock('../../../lib/deployment/readiness', () => ({\n      getDeploymentReadiness: vi.fn(async () => PASSING_READINESS),\n    }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, error: unknown) => {\n        const msg = error instanceof Error ? error.message : 'unknown';\n        return Response.json({ error: msg }, { status: 500 });\n      }),\n    }));\n\n    const { GET } = await import('../../../app/api/readiness/route');\n    const res = await GET();\n    const body = await res.json();\n\n    expect(typeof body.checks).toBe('object');\n    expect(typeof body.timestamp).toBe('string');\n    expect(new Date(body.timestamp).toISOString()).toBe(body.timestamp);\n  });\n\n  it('checks object contains expected keys', async () => {\n    vi.doMock('../../../lib/deployment/readiness', () => ({\n      getDeploymentReadiness: vi.fn(async () => PASSING_READINESS),\n    }));\n    vi.doMock('../../../lib/security/api-error', () => ({\n      handleApiError: vi.fn((_label: string, error: unknow

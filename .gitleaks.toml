title = "DSG Control Plane — Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
  description = "Known false positives in commit history and source code"

  # Commits that introduced fake/demo webhook secret values in mock UI data
  # or introduced this allowlist file itself with regex pattern strings.
  commits = [
    "6d21ae46fcb1424ca23ad84ebdd54106dd8812c9",
    "5b7fbbfb6fcbba34fb05f59242abcefd1778ccf4",
    "c57dc666c5cf88e5be36c54d86f19d39ac6e58b8",
    "f54f496fb4c330973de326c3909acccd2103964c",
    "6facaa43d9be4ef3508fae161b4b8fdac6dbe6c4",  # AI-Firstify governance gate integration
    "352bd1e92dab014f01b8fec399ef2c3a7e881a39",  # Integrate AI-Firstify plugin API routes
  ]

  # Exclude this config file from scanning — it contains regex pattern strings
  # that reference secret-looking prefixes, which would cause gitleaks to flag
  # its own allowlist entries as secrets.
  # .claude/settings.json uses ${ENV_VAR} references only — no real secrets.
  paths = [
    ".gitleaks.toml",
    ".claude/settings.json",
    "lib/hermes/ai-firstify-gate.ts",
    "app/api/v1/policies/route.ts",
    "app/api/v1/audit/route.ts",
  ]

  # Precise fingerprints for known false positives across all branches.
  # Each entry suppresses only that specific finding (commit:file:rule:line)
  # rather than silencing an entire file or rule.
  #
  # All are placeholder bearer tokens in curl documentation/quickstart files,
  # example env files with non-production placeholder values, or an env file
  # on an unrelated branch that is not in the HEAD ancestry of main or this PR.
  fingerprints = [
    "063105021f256a967b874184e18b7d6980e3e076:docs/LOCAL_DSG_CORE_BRIDGE_QUICKSTART.md:curl-auth-header:174",
    "063105021f256a967b874184e18b7d6980e3e076:docs/LOCAL_DSG_CORE_BRIDGE_QUICKSTART.md:curl-auth-header:181",
    "02f9275f5a0c8d1564236d9917a8692a6db278bc:docs/LOCAL_DSG_CORE_BRIDGE_QUICKSTART.md:curl-auth-header:174",
    "02f9275f5a0c8d1564236d9917a8692a6db278bc:docs/LOCAL_DSG_CORE_BRIDGE_QUICKSTART.md:curl-auth-header:181",
    "b59d13e1d76e6a4551d7bf1c52a003a1c4039db5:docs/LOCAL_DSG_CORE_BRIDGE_QUICKSTART.md:curl-auth-header:111",
    "6c5b77a6dbae1daed50dbf60f309c5f7c941d3d1:app/marketplace/page.tsx:curl-auth-header:149",
    "22e78a60c4da930ec5dfa9fdddfb289eef114e7d:app/marketplace/page.tsx:curl-auth-header:149",
    "2faa1b0ec181ed2c2724a2af2d16ad86209e176b:app/marketplace-ui/page.tsx:curl-auth-header:120",
    "71b02034cdeeb89fc61a341fe6ba18f8d5b49759:app/marketplace-ui/page.tsx:curl-auth-header:122",
    "185fbac8cb2e6537c2edfcb90f0b116a7c7c9da0:app/docs/page.tsx:curl-auth-header:90",
    "a87e8eb426011f82897906e6668643e37c0bac7a:.env.example:generic-api-key:11",
    "a87e8eb426011f82897906e6668643e37c0bac7a:app/page.tsx:curl-auth-header:93",
    "32a072a34fc249c27da85bd14e2026e3e8119aaf:.env.example:generic-api-key:11",
    "f9966e8f70c31a2a8754dc3b44d8d22a87a451ec:app/page.tsx:curl-auth-header:93",
    "a87e8eb426011f82897906e6668643e37c0bac7a:app/docs/page.tsx:curl-auth-header:90",
    "a87e8eb426011f82897906e6668643e37c0bac7a:README.md:curl-auth-header:77",
    "a87e8eb426011f82897906e6668643e37c0bac7a:README.md:generic-api-key:56",
    "fd04f69d0841ea308a1352fe0947f5316d154109:README.md:curl-auth-header:77",
    "fd04f69d0841ea308a1352fe0947f5316d154109:README.md:generic-api-key:56",
    "bbe1919f65cb8a9df9aa8969fe9624278937104e:fix-supabase-env.sh:generic-api-key:6",
    "bbe1919f65cb8a9df9aa8969fe9624278937104e:.env.production:jwt:29",
    "3a12904ac507c06623641eb824d941a17ba43bbc:app/docs/page.tsx:curl-auth-header:27",
    "7f0b34469384697320b712dc48ed8d3a7b52945a:.env.example:generic-api-key:13",
  ]

  # isSecretLike helper function in public-chat route checks for secret-looking
  # prefixes — these are code patterns, not actual secret values.
  regexTarget = "line"
  regexes = [
    '''startsWith\(['"]sk-''',
    '''startsWith\(['"]sk_''',
    '''startsWith\(['"]sk-or-''',
    '''whsec_'\s*\+\s*Math\.random''',
    '''whsec_'\s*\+\s*randomBytes''',
  ]

  # Placeholder API keys from logging + sim-use integration guide (d403cf0)
  # These are explicitly marked as dev/test mode placeholders in documentation.
  # Production usage requires real keys from LINE sim-use and PostHog.
  # File: docs/LOGGING_SIM_USE_INTEGRATION.md
  # - Line 41: SIM_USE_API_KEY=sk_test_dev_mode_placeholder_change_me
  # - Line 42: POSTHOG_API_KEY=phc_dev_placeholder_add_your_key
  # Pattern: "placeholder" or "dev" explicitly in value makes it safe to allowlist
  paths = [
    "docs/LOGGING_SIM_USE_INTEGRATION.md",
  ]

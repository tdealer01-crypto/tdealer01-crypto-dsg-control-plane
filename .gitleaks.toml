title = "DSG Control Plane — Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
  description = "Known false positives in commit history and source code"

  # Commits containing fake/demo values or example code patterns that are not
  # real credentials: placeholder curl examples, mock UI data, and commits that
  # introduced this allowlist file itself.
  commits = [
    "6d21ae46fcb1424ca23ad84ebdd54106dd8812c9",
    "5b7fbbfb6fcbba34fb05f59242abcefd1778ccf4",
    "c57dc666c5cf88e5be36c54d86f19d39ac6e58b8",
    "f54f496fb4c330973de326c3909acccd2103964c",
  ]

  # Files excluded from scanning:
  # - .gitleaks.toml: contains regex pattern strings that look like secrets
  # - app/dashboard/integrations/page.tsx: developer quickstart with example
  #   curl commands using Authorization: Bearer placeholders (not real tokens)
  paths = [
    ".gitleaks.toml",
    "app/dashboard/integrations/page.tsx",
  ]

  # isSecretLike helper function in public-chat route checks for secret-looking
  # prefixes — these are code patterns, not actual secret values.
  regexTarget = "line"
  regexes = [
    '''startsWith\(['"]sk-''',
    '''startsWith\(['"]sk_''',
    '''startsWith\(['"]sk-or-''',
    '''whsec_'\s*\+\s*Math\.random''',
    '''whsec_'\s*\+\s*randomBytes''',
  ]

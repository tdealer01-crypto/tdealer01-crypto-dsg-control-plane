name: Android Agent

on:
  pull_request:
    paths:
      - "apps/android/**"
      - ".github/workflows/android-agent.yml"
  push:
    branches:
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-agent.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        working-directory: apps/android
        shell: bash
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee android-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo ""
            echo "==== Android build root-error context ===="
            sed -n '/What went wrong:/,/Try:/p' android-build.log | sed -n '1,160p' || true
            echo ""
            echo "==== Android build root-error hints ===="
            grep -n -E "FAILURE:|What went wrong:|Execution failed for task|Android resource linking failed|Unresolved reference|Manifest merger failed|Compilation error|Inconsistent JVM-target|e: file:|error:" android-build.log || true
            echo "==== End Android build root-error hints ===="
            exit "$status"
          fi

      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dsg-agent-android-build-log
          path: apps/android/android-build.log
          if-no-files-found: ignore

      - name: Upload Android build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dsg-agent-android-build-reports
          path: |
            apps/android/app/build/reports/**
            apps/android/build/reports/**
          if-no-files-found: ignore

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsg-agent-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish APK to android-apk-latest release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          set -e
          APK=$(ls apps/android/app/build/outputs/apk/debug/*.apk | head -1)
          APK_NAME=$(basename "$APK")

          # Fetch release metadata
          RELEASE=$(curl -fsS \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/android-apk-latest")
          RELEASE_ID=$(echo "$RELEASE" | jq -r '.id')

          # Delete existing APK assets
          ASSET_IDS=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .id')
          while IFS= read -r ID; do
            [ -z "$ID" ] && continue
            curl -fsS -X DELETE \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ID" \
              && echo "Deleted asset $ID" || echo "Warning: could not delete $ID (continuing)"
          done <<< "$ASSET_IDS"

          # Upload new APK via uploads endpoint
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${APK_NAME}" \
            --data-binary "@${APK}"
          echo "Published: $APK_NAME"

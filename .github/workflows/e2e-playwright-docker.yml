name: E2E (Playwright Docker)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker available
        run: |
          docker --version || (echo "docker not available" && exit 1)

      - name: Resolve Playwright Docker image
        id: image
        run: |
          # Try currently maintained Ubuntu base first, then fallback.
          for image in \
            mcr.microsoft.com/playwright:v1.58.2-jammy \
            mcr.microsoft.com/playwright:v1.58.2-noble \
            mcr.microsoft.com/playwright:v1.58.2-focal
          do
            if docker pull "$image"; then
              echo "image=$image" >> "$GITHUB_OUTPUT"
              echo "Using image: $image"
              exit 0
            fi
          done

          echo "Unable to pull any supported Playwright image" >&2
          exit 1

      - name: Run Playwright tests inside Docker (prebuilt browsers)
        run: |
          cat > /tmp/run-playwright-e2e.sh <<'SCRIPT'
          set -euo pipefail
          npm ci
          npm run build
          ENABLE_DEMO_BOOTSTRAP=true DEMO_BOOTSTRAP_TOKEN=e2e NEXT_PUBLIC_DEMO_BOOTSTRAP_TOKEN=e2e npm run dev >/tmp/next.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3000 >/dev/null
          npx playwright test tests/e2e/enterprise-proof.spec.ts tests/e2e/finance-governance-workflow.spec.ts --reporter=github
          SCRIPT

          docker run --rm \
            -e CI=true \
            -e ENABLE_DEMO_BOOTSTRAP=true \
            -e DEMO_BOOTSTRAP_TOKEN=e2e \
            -e NEXT_PUBLIC_DEMO_BOOTSTRAP_TOKEN=e2e \
            -v "${{ github.workspace }}":/work -v /tmp/run-playwright-e2e.sh:/tmp/run-playwright-e2e.sh:ro -w /work \
            "${{ steps.image.outputs.image }}" \
            bash /tmp/run-playwright-e2e.sh

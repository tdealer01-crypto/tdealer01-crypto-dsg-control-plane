name: DSG Proof Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  proof-gate:
    name: DSG Proof Gate — Claim Scan + Evidence Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Step 1: Scan repo for unsupported production claims
      - name: Scan for unsupported production claims
        id: claim-scan
        run: |
          echo "=== DSG Claim Boundary Scan ==="
          BLOCKED_PATTERNS=(
            "production-ready"
            "marketplace-ready"
            "enterprise-ready 100%"
            "certified compliance"
            "guaranteed compliance"
            "third-party audited"
            "WORM-certified storage"
            "JWT/JWKS auth complete"
            "mainnet launched"
          )

          VIOLATIONS=0
          REPORT=""

          for PATTERN in "${BLOCKED_PATTERNS[@]}"; do
            MATCHES=$(rg -l --glob '!*.md' --glob '!CLAUDE.md' --glob '!AGENTS.md' \
              --glob '!*.yml' --glob '!*.json' \
              -i "$PATTERN" app/ lib/ components/ 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "❌ Blocked claim found: \"$PATTERN\""
              echo "$MATCHES" | while IFS= read -r f; do echo "   → $f"; done
              VIOLATIONS=$((VIOLATIONS + 1))
              REPORT="$REPORT\n- **\"$PATTERN\"** found in source files"
            fi
          done

          echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo ""
            echo "❌ $VIOLATIONS blocked production claim(s) found in source code."
            echo "   Remove these claims or move them to docs/ with evidence references."
            exit 1
          fi

          echo "✅ No unsupported production claims found in source code."

      # Step 2: Detect legacy deprecated endpoints
      - name: Detect legacy server-store callers
        run: |
          echo "=== Legacy Endpoint Scan ==="
          if rg -n --glob '!scripts/go-no-go-gate.sh' \
            '/api/finance-governance/server-store/' \
            app/ lib/ components/ scripts/ 2>/dev/null; then
            echo "❌ Legacy /api/finance-governance/server-store/ callers found"
            exit 1
          fi
          echo "✅ No legacy server-store callers found"

      # Step 3: Run evidence checks
      - name: Run deterministic module verification
        run: |
          echo "=== Deterministic Gate Verification ==="
          node scripts/verify-deterministic-module.mjs

      - name: Run production manifest gate
        run: |
          echo "=== Production Manifest ==="
          node scripts/verify-production-manifest.mjs

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run test suite (unit + integration)
        run: npm run test
        env:
          NODE_ENV: test

      # Step 4: Generate proof report
      - name: Generate DSG proof report
        id: proof-report
        if: always()
        run: |
          echo "=== DSG Proof Report ==="
          COMMIT_SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          CLAIM_VIOLATIONS="${{ steps.claim-scan.outputs.violations }}"

          cat > /tmp/dsg-proof-report.json << EOF
          {
            "schema_version": "1.0.0",
            "generated_at": "$NOW",
            "commit": "$COMMIT_SHA",
            "branch": "$BRANCH",
            "boundary": {
              "certificationClaim": false,
              "independentAuditClaim": false,
              "statement": "Pre-audit evidence mapping. Not a legal certification."
            },
            "gates": {
              "claim_scan": "${{ steps.claim-scan.outcome }}",
              "typecheck": "see-job-step",
              "tests": "see-job-step",
              "manifest": "see-job-step",
              "deterministic_module": "see-job-step"
            },
            "claim_violations": ${CLAIM_VIOLATIONS:-0}
          }
          EOF

          cat /tmp/dsg-proof-report.json
          echo "report_path=/tmp/dsg-proof-report.json" >> "$GITHUB_OUTPUT"

      - name: Upload proof report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dsg-proof-report-${{ github.sha }}
          path: /tmp/dsg-proof-report.json
          retention-days: 90

      # Step 5: Block merge/deploy if claim violations found
      - name: Gate — block if claim violations exist
        if: steps.claim-scan.outputs.violations != '0'
        run: |
          echo "🚫 DSG Proof Gate: BLOCKED"
          echo "Unsupported production claims were found in source code."
          echo "Remove or evidence-gate these claims before merging."
          exit 1

      - name: Gate — PASS
        if: steps.claim-scan.outputs.violations == '0'
        run: |
          echo "✅ DSG Proof Gate: PASS"
          echo "No unsupported claims found. Evidence checks passed."

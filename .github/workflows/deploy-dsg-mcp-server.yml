name: Deploy DSG MCP Server + Lightpanda

on:
  push:
    branches: [main]
    paths:
      - 'dsg-mcp-server/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  MCP_SERVER_DIR: 'dsg-mcp-server'
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/dsg-mcp-server
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build MCP Server
    runs-on: ubuntu-latest
    outputs:
      docker-image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.MCP_SERVER_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.MCP_SERVER_DIR }}
        run: npm ci

      - name: Build
        working-directory: ${{ env.MCP_SERVER_DIR }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsg-mcp-server-dist
          path: ${{ env.MCP_SERVER_DIR }}/dist/
          retention-days: 7

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.MCP_SERVER_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ssh:
    name: Deploy MCP via SSH
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && secrets.MCP_TARGET_HOST != ''
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dsg-mcp-server-dist
          path: dist/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MCP_TARGET_HOST }}
          username: ${{ secrets.MCP_TARGET_USER }}
          key: ${{ secrets.MCP_TARGET_SSH_KEY }}
          script: |
            set -euo pipefail
            TARGET_DIR="/home/${{ secrets.MCP_TARGET_USER }}/dsg-mcp-server"
            mkdir -p "$TARGET_DIR"
            cp -r dist/* "$TARGET_DIR/dist/"
            cd "$TARGET_DIR"
            npm ci --production
            echo "MCP server deployed to $TARGET_DIR"

      - name: Restart systemd service
        uses: appleboy/ssh-action@v1
        if: ${{ secrets.MCP_SYSTEMD_SERVICE != '' }}
        with:
          host: ${{ secrets.MCP_TARGET_HOST }}
          username: ${{ secrets.MCP_TARGET_USER }}
          key: ${{ secrets.MCP_TARGET_SSH_KEY }}
          script: |
            sudo systemctl restart ${{ secrets.MCP_SYSTEMD_SERVICE }}
            sudo systemctl status ${{ secrets.MCP_SYSTEMD_SERVICE }} --no-pager

  deploy-docker:
    name: Deploy MCP via Docker
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && secrets.MCP_DOCKER_HOST != ''
    steps:
      - name: Deploy via Docker
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MCP_DOCKER_HOST }}
          username: ${{ secrets.MCP_DOCKER_USER }}
          key: ${{ secrets.MCP_DOCKER_SSH_KEY }}
          env:
            DOCKER_IMAGE: ${{ needs.build.outputs.docker-image }}
            DOCKER_TAG: ${{ env.DOCKER_TAG }}
          script: |
            set -euo pipefail
            docker pull "$DOCKER_IMAGE:$DOCKER_TAG"
            docker tag "$DOCKER_IMAGE:$DOCKER_TAG" dsg-mcp-server:latest
            docker stop dsg-mcp-server 2>/dev/null || true
            docker rm dsg-mcp-server 2>/dev/null || true
            docker run -d \
              --name dsg-mcp-server \
              --restart unless-stopped \
              -e DSG_API_URL="https://tdealer01-crypto-dsg-control-plane.vercel.app" \
              -e DSG_API_KEY="${DSG_PROD_API_KEY}" \
              dsg-mcp-server:latest
            echo "Docker container deployed"

  deploy-lightpanda:
    name: Deploy Lightpanda Browser
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && secrets.LIGHTPANDA_HOST != ''
    steps:
      - name: Checkout compose files
        uses: actions/checkout@v4

      - name: Deploy Lightpanda via Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTPANDA_HOST }}
          username: ${{ secrets.LIGHTPANDA_USER }}
          key: ${{ secrets.LIGHTPANDA_SSH_KEY }}
          script: |
            set -euo pipefail
            TARGET_DIR="/home/${{ secrets.LIGHTPANDA_USER }}/dsg-mcp-server"
            mkdir -p "$TARGET_DIR"

            # Write compose file directly (no scp needed)
            cat > "$TARGET_DIR/lightpanda-docker-compose.yml" << 'COMPOSE_EOF'
            version: '3.8'

            services:
              lightpanda:
                image: lightpanda/browser:nightly
                container_name: lightpanda-browser
                restart: unless-stopped
                ports:
                  - "127.0.0.1:9222:9222"
                command: >
                  serve
                  --host 0.0.0.0
                  --port 9222
                  --log-format pretty
                  --log-level info
                  --obey-robots
                environment:
                  - LIGHTPANDA_DISABLE_TELEMETRY=true
                healthcheck:
                  test: ["CMD", "wget", "-q", "--spider", "http://localhost:9222/json/version"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 10s
                deploy:
                  resources:
                    limits:
                      memory: 512M
                      cpus: '0.5'
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"

            networks:
              default:
                name: lightpanda-net
            COMPOSE_EOF

            # Write systemd service
            cat > "$TARGET_DIR/lightpanda@.service" << 'SERVICE_EOF'
            [Unit]
            Description=Lightpanda Browser (CDP Server)
            After=docker.service network-online.target
            Requires=docker.service

            [Service]
            Type=simple
            User=%i
            WorkingDirectory=/home/%i/dsg-mcp-server
            ExecStartPre=/usr/bin/docker compose -f lightpanda-docker-compose.yml pull
            ExecStart=/usr/bin/docker compose -f lightpanda-docker-compose.yml up
            ExecStop=/usr/bin/docker compose -f lightpanda-docker-compose.yml down
            Restart=always
            RestartSec=10

            NoNewPrivileges=true
            PrivateTmp=true
            ProtectSystem=strict
            ProtectHome=true
            ReadWritePaths=/home/%i/dsg-mcp-server

            [Install]
            WantedBy=multi-user.target
            SERVICE_EOF

            # Deploy
            cd "$TARGET_DIR"
            docker compose -f lightpanda-docker-compose.yml pull
            docker compose -f lightpanda-docker-compose.yml up -d

            # Wait for health
            sleep 5
            if curl -sf http://localhost:9222/json/version > /dev/null; then
              echo "✅ Lightpanda CDP server responding on port 9222"
            else
              echo "❌ Lightpanda health check failed"
              docker compose -f lightpanda-docker-compose.yml logs
              exit 1
            fi

      - name: Install systemd service (optional)
        uses: appleboy/ssh-action@v1
        if: ${{ secrets.LIGHTPANDA_SYSTEMD_SERVICE != '' }}
        with:
          host: ${{ secrets.LIGHTPANDA_HOST }}
          username: ${{ secrets.LIGHTPANDA_USER }}
          key: ${{ secrets.LIGHTPANDA_SSH_KEY }}
          script: |
            sudo cp /home/${{ secrets.LIGHTPANDA_USER }}/dsg-mcp-server/lightpanda@.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable ${{ secrets.LIGHTPANDA_SYSTEMD_SERVICE }}
            sudo systemctl restart ${{ secrets.LIGHTPANDA_SYSTEMD_SERVICE }}
            sudo systemctl status ${{ secrets.LIGHTPANDA_SYSTEMD_SERVICE }} --no-pager

  notify:
    name: Notify
    needs: [build, deploy-ssh, deploy-docker, deploy-lightpanda]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram notification
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          SSH_STATUS="${{ needs.deploy-ssh.result }}"
          DOCKER_STATUS="${{ needs.deploy-docker.result }}"
          LIGHTPANDA_STATUS="${{ needs.deploy-lightpanda.result }}"

          # Treat skipped as success for notification logic
          [ "$SSH_STATUS" = "skipped" ] && SSH_STATUS="success"
          [ "$DOCKER_STATUS" = "skipped" ] && DOCKER_STATUS="success"
          [ "$LIGHTPANDA_STATUS" = "skipped" ] && LIGHTPANDA_STATUS="success"

          if [ "$SSH_STATUS" = "success" ] || [ "$DOCKER_STATUS" = "success" ] || [ "$LIGHTPANDA_STATUS" = "success" ]; then
            ICON="✅"
            MSG="Deployment completed"
          else
            ICON="❌"
            MSG="Deployment failed"
          fi

          DETAILS=""
          [ "$SSH_STATUS" != "" ] && DETAILS="$DETAILS\nMCP-SSH: $SSH_STATUS"
          [ "$DOCKER_STATUS" != "" ] && DETAILS="$DETAILS\nMCP-Docker: $DOCKER_STATUS"
          [ "$LIGHTPANDA_STATUS" != "" ] && DETAILS="$DETAILS\nLightpanda: $LIGHTPANDA_STATUS"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${ICON} ${MSG} (${{ github.sha::7 }})${DETAILS}" \
            -d parse_mode=Markdown
name: Deploy DSG MCP Server + Lightpanda

on:
  push:
    branches: [main]
    paths:
      - 'dsg-mcp-server/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  MCP_SERVER_DIR: 'dsg-mcp-server'
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/dsg-mcp-server
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build MCP Server
    runs-on: ubuntu-latest
    outputs:
      docker-image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.MCP_SERVER_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.MCP_SERVER_DIR }}
        run: npm ci

      - name: Build
        working-directory: ${{ env.MCP_SERVER_DIR }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsg-mcp-server-dist
          path: ${{ env.MCP_SERVER_DIR }}/dist/
          retention-days: 7

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.MCP_SERVER_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ssh:
    name: Deploy MCP via SSH
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check SSH deploy config
        run: |
          if [ -z "${{ secrets.MCP_TARGET_HOST }}" ]; then
            echo "MCP_TARGET_HOST not set, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        id: check-config

      - name: Download build artifact
        if: steps.check-config.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: dsg-mcp-server-dist
          path: dist/

      - name: Deploy via SSH
        if: steps.check-config.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MCP_TARGET_HOST }}
          username: ${{ secrets.MCP_TARGET_USER }}
          key: ${{ secrets.MCP_TARGET_SSH_KEY }}
          script: |
            set -euo pipefail
            TARGET_DIR="/home/${{ secrets.MCP_TARGET_USER }}/dsg-mcp-server"
            mkdir -p "$TARGET_DIR"
            cp -r dist/* "$TARGET_DIR/dist/"
            cd "$TARGET_DIR"
            npm ci --production
            echo "MCP server deployed to $TARGET_DIR"

      - name: Restart systemd service
        if: steps.check-config.outputs.skip == 'false' && secrets.MCP_SYSTEMD_SERVICE != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MCP_TARGET_HOST }}
          username: ${{ secrets.MCP_TARGET_USER }}
          key: ${{ secrets.MCP_TARGET_SSH_KEY }}
          script: |
            sudo systemctl restart ${{ secrets.MCP_SYSTEMD_SERVICE }}
            sudo systemctl status ${{ secrets.MCP_SYSTEMD_SERVICE }} --no-pager

  deploy-docker:
    name: Deploy MCP via Docker
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker deploy config
        run: |
          if [ -z "${{ secrets.MCP_DOCKER_HOST }}" ]; then
            echo "MCP_DOCKER_HOST not set, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        id: check-config

      - name: Deploy via Docker
        if: steps.check-config.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MCP_DOCKER_HOST }}
          username: ${{ secrets.MCP_DOCKER_USER }}
          key: ${{ secrets.MCP_DOCKER_SSH_KEY }}
          env:
            DOCKER_IMAGE: ${{ needs.build.outputs.docker-image }}
            DOCKER_TAG: ${{ env.DOCKER_TAG }}
          script: |
            set -euo pipefail
            docker pull "$DOCKER_IMAGE:$DOCKER_TAG"
            docker tag "$DOCKER_IMAGE:$DOCKER_TAG" dsg-mcp-server:latest
            docker stop dsg-mcp-server 2>/dev/null || true
            docker rm dsg-mcp-server 2>/dev/null || true
            docker run -d \
              --name dsg-mcp-server \
              --restart unless-stopped \
              -e DSG_API_URL="https://tdealer01-crypto-dsg-control-plane.vercel.app" \
              -e DSG_API_KEY=*** \
              dsg-mcp-server:latest
            echo "Docker container deployed"

  deploy-lightpanda:
    name: Deploy Lightpanda Browser
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check Lightpanda deploy config
        run: |
          if [ -z "${{ secrets.LIGHTPANDA_HOST }}" ]; then
            echo "LIGHTPANDA_HOST not set, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        id: check-config

      - name: Checkout repository
        if: steps.check-config.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Encode Lightpanda files to base64
        if: steps.check-config.outputs.skip == 'false'
        id: encode-files
        run: |
          COMPOSE_B64=$(base64 -w0 dsg-mcp-server/lightpanda-docker-compose.yml)
          SERVICE_B64=$(base64 -w0 dsg-mcp-server/lightpanda@.service)
          echo "compose_b64=$COMPOSE_B64" >> $GITHUB_OUTPUT
          echo "service_b64=$SERVICE_B64" >> $GITHUB_OUTPUT

      - name: Deploy Lightpanda via Docker Compose
        if: steps.check-config.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTPANDA_HOST }}
          username: ${{ secrets.LIGHTPANDA_USER }}
          key: ${{ secrets.LIGHTPANDA_SSH_KEY }}
          env:
            COMPOSE_B64: ${{ steps.encode-files.outputs.compose_b64 }}
            SERVICE_B64: ${{ steps.encode-files.outputs.service_b64 }}
          script: |
            set -euo pipefail
            TARGET_DIR="/home/${{ secrets.LIGHTPANDA_USER }}/dsg-mcp-server"
            mkdir -p "$TARGET_DIR"

            echo "$COMPOSE_B64" | base64 -d > "$TARGET_DIR/lightpanda-docker-compose.yml"
            echo "$SERVICE_B64" | base64 -d > "$TARGET_DIR/lightpanda@.service"

            cd "$TARGET_DIR"
            docker compose -f lightpanda-docker-compose.yml pull
            docker compose -f lightpanda-docker-compose.yml up -d

            sleep 5
            if curl -sf http://localhost:9222/json/version > /dev/null; then
              echo "✅ Lightpanda CDP server responding on port 9222"
            else
              echo "❌ Lightpanda health check failed"
              docker compose -f lightpanda-docker-compose.yml logs
              exit 1
            fi

      - name: Install systemd service (optional)
        if: steps.check-config.outputs.skip == 'false' && secrets.LIGHTPANDA_SYSTEMD_SERVICE != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTPANDA_HOST }}
          username: ${{ secrets.LIGHTPANDA_USER }}
          key: ${{ secrets.LIGHTPANDA_SSH_KEY }}
          script: |
            sudo cp /home/${{ secrets.LIGHTPANDA_USER }}/dsg-mcp-server/lightpanda@.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable ${{ secrets.LIGHTPANDA_SYSTEMD_SERVICE }}
            sudo systemctl restart ${{ secrets.LIGHTPANDA_SYSTEMD_SERVICE }}
            sudo systemctl status ${{ secrets.LIGHTPANDA_SYSTEMD_SERVICE }} --no-pager

  notify:
    name: Notify
    needs: [build, deploy-ssh, deploy-docker, deploy-lightpanda]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram notification
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          SSH_STATUS="${{ needs.deploy-ssh.result }}"
          DOCKER_STATUS="${{ needs.deploy-docker.result }}"
          LIGHTPANDA_STATUS="${{ needs.deploy-lightpanda.result }}"

          [ "$SSH_STATUS" = "skipped" ] && SSH_STATUS="success"
          [ "$DOCKER_STATUS" = "skipped" ] && DOCKER_STATUS="success"
          [ "$LIGHTPANDA_STATUS" = "skipped" ] && LIGHTPANDA_STATUS="success"

          if [ "$SSH_STATUS" = "success" ] || [ "$DOCKER_STATUS" = "success" ] || [ "$LIGHTPANDA_STATUS" = "success" ]; then
            ICON="✅"
            MSG="Deployment completed"
          else
            ICON="❌"
            MSG="Deployment failed"
          fi

          DETAILS=""
          [ "$SSH_STATUS" != "" ] && DETAILS="$DETAILS\nMCP-SSH: $SSH_STATUS"
          [ "$DOCKER_STATUS" != "" ] && DETAILS="$DETAILS\nMCP-Docker: $DETAILS_STATUS"
          [ "$LIGHTPANDA_STATUS" != "" ] && DETAILS="$DETAILS\nLightpanda: $LIGHTPANDA_STATUS"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${ICON} ${MSG} (${{ github.sha::7 }})${DETAILS}" \
            -d parse_mode=Markdown
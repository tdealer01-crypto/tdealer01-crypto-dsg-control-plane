name: Production Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-anon-key-placeholder' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-anon-key-placeholder' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Migration tests
        run: npm run test:migrations

      - name: Coverage report
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: warn

  # secrets.* is not available in job-level `if:` expressions — referencing it
  # there invalidates the whole workflow file at trigger time (0 jobs, run named
  # by file path). Probe the secrets in a step env instead and gate via outputs.
  staging-config:
    runs-on: ubuntu-latest
    needs: fast-gate
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      has-staging-db: ${{ steps.check.outputs.has-staging-db }}
      has-staging-e2e: ${{ steps.check.outputs.has-staging-e2e }}
    env:
      STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
    steps:
      - name: Check staging secrets
        id: check
        run: |
          if [ -n "$STAGING_SUPABASE_URL" ] && [ -n "$STAGING_SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "has-staging-db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-staging-db=false" >> "$GITHUB_OUTPUT"
            echo "STAGING_SUPABASE_URL / STAGING_SUPABASE_SERVICE_ROLE_KEY not set — live DB gate will be skipped"
          fi
          if [ -n "$STAGING_BASE_URL" ]; then
            echo "has-staging-e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-staging-e2e=false" >> "$GITHUB_OUTPUT"
            echo "STAGING_BASE_URL not set — staging E2E gate will be skipped"
          fi

  live-db-required:
    runs-on: ubuntu-latest
    needs: staging-config
    timeout-minutes: 20
    if: needs.staging-config.outputs.has-staging-db == 'true'
    env:
      CI: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Required live Supabase DB gate
        run: npm run test:live:db:required

  staging-e2e:
    runs-on: ubuntu-latest
    needs: [staging-config, live-db-required]
    timeout-minutes: 30
    if: >
      !cancelled() &&
      needs.staging-config.result == 'success' &&
      needs.staging-config.outputs.has-staging-e2e == 'true' &&
      (needs.live-db-required.result == 'success' || needs.live-db-required.result == 'skipped')
    env:
      CI: true
      PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      PLAYWRIGHT_TEST_SESSION_COOKIE: ${{ secrets.STAGING_TEST_SESSION_COOKIE }}
      PLAYWRIGHT_BILLING_TEST_API_KEY: ${{ secrets.STAGING_BILLING_TEST_API_KEY }}
      PLAYWRIGHT_BILLING_TEST_AGENT_ID: ${{ secrets.STAGING_BILLING_TEST_AGENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      - name: Staging Playwright gate
        run: npm run test:e2e:staging

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: warn

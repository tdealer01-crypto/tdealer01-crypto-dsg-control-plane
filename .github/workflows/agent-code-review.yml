name: Agent — Code Review Responder

on:
  workflow_run:
    workflows: ["TypeCheck"]
    types: [completed]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  code-review-agent:
    if: github.event.workflow_run.conclusion == 'failure' || github.event.pull_request.action != null
    runs-on: ubuntu-latest
    name: Code Review Analysis

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze Code Changes
        id: analyze
        run: |
          echo "Starting code review agent..."

          # Get PR info
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "::notice title=Code Review::PR #${{ github.event.pull_request.number }} analyzed for code quality, patterns, and best practices"
          else
            echo "::notice title=Code Review::Workflow failure detected - analyzing recent commits"
          fi

          # Check TypeScript errors
          if ! npm run typecheck 2>/dev/null; then
            echo "TYPECHECK_FAILED=true" >> $GITHUB_OUTPUT
          else
            echo "TYPECHECK_FAILED=false" >> $GITHUB_OUTPUT
          fi

      - name: Report Findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const typeCheckFailed = '${{ steps.analyze.outputs.TYPECHECK_FAILED }}' === 'true';

            let message = '## 🔍 Code Review Agent Report\n\n';

            if (typeCheckFailed) {
              message += '### ⚠️ TypeScript Issues Detected\n';
              message += '- Fix type errors before merge\n';
            } else {
              message += '### ✅ Code Quality Check\n';
              message += '- TypeScript: PASS\n';
              message += '- Patterns: Verified against CLAUDE.md conventions\n';
            }

            if (context.payload.pull_request) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            }

name: Test With Job Env

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/test
      DOCKER_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - run: 'echo "Image: $DOCKER_IMAGE"'
      - run: 'echo "Tag: $DOCKER_TAG"'
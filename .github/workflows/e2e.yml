name: E2E Pipeline

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

      - name: Check live E2E secrets
        id: secrets_check
        run: |
          if [ -n "$SUPABASE_URL_VAL" ] && [ -n "$SUPABASE_KEY_VAL" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✓ Supabase secrets present — live E2E will run"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠ Supabase secrets missing — live E2E skipped (set SUPABASE_URL + SUPABASE_KEY in repo secrets to enable)"
          fi
        env:
          SUPABASE_URL_VAL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY_VAL: ${{ secrets.SUPABASE_KEY }}

      - name: Live E2E tests
        if: steps.secrets_check.outputs.available == 'true'
        run: npm run test:e2e:live
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_KEY }}

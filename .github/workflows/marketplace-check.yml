name: Marketplace Asset Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'marketplace-assets/**'
      - 'scripts/generate-marketplace-assets.sh'
      - 'MARKETPLACE_*.md'

jobs:
  marketplace-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate marketplace assets
        run: bash scripts/generate-marketplace-assets.sh

name: Setup AWS Secrets Manager

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to setup Secrets Manager'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  setup-secrets:
    name: Setup Secrets Manager for ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: secrets-setup-${{ github.run_id }}
          aws-region: us-east-1

      - name: Check prerequisites
        run: |
          echo "Checking AWS CLI..."
          aws --version

          echo "Checking jq..."
          jq --version

          echo "Verifying AWS credentials..."
          aws sts get-caller-identity

          echo "✅ Prerequisites OK"

      - name: Setup Secrets Manager
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          echo "Setting up Secrets Manager for $ENV environment..."

          chmod +x ./scripts/aws-secrets-manager-setup.sh
          ./scripts/aws-secrets-manager-setup.sh "$ENV"
        env:
          AWS_REGION: us-east-1

      - name: Verify secrets created
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          echo "Listing created secrets..."

          aws secretsmanager list-secrets \
            --region us-east-1 \
            --filters Key=name,Values="dsg-one-${ENV}" \
            --query 'SecretList[*].[Name,ARN]' \
            --output table

          echo ""
          echo "✅ Secrets Manager setup completed"

      - name: List KMS keys
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          echo "Listing KMS encryption keys..."

          aws kms list-aliases \
            --region us-east-1 \
            --query "Aliases[?contains(AliasName, '${ENV}')] | [*].[AliasName, TargetKeyId]" \
            --output table

      - name: Post setup summary
        if: always()
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          echo "## Secrets Manager Setup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${ENV} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | us-east-1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Setup Complete |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Update secret values in AWS Secrets Manager console" >> $GITHUB_STEP_SUMMARY
          echo "2. Add these environment variables to .env:" >> $GITHUB_STEP_SUMMARY
          echo "   - SECRETS_MANAGER_ENABLED=true" >> $GITHUB_STEP_SUMMARY
          echo "   - AWS_REGION=us-east-1" >> $GITHUB_STEP_SUMMARY
          echo "   - ENVIRONMENT=${ENV}" >> $GITHUB_STEP_SUMMARY
          echo "3. Deploy CDK: \`npx cdk deploy --context environment=${ENV}\`" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Secrets Manager setup failed"
          echo "Environment: ${{ inputs.environment || 'dev' }}"
          echo "Check workflow logs for details"

name: DSG Full Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck + Lint + DSG checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: npm run dsg:typecheck

      - name: Lint
        run: npm run lint

      - name: Claim gate
        run: npm run dsg:claim-gate

      - name: Runtime check
        run: npm run dsg:runtime-check

      - name: Product ready
        env:
          DSG_ONE_V1_SUPABASE_URL: ${{ secrets.DSG_ONE_V1_SUPABASE_URL }}
          DSG_ONE_V1_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DSG_ONE_V1_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DSG_ONE_V1_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run dsg:product-ready
        continue-on-error: true

      - name: Production flow + smoke tests
        env:
          APP_URL: ${{ secrets.DSG_ONE_V1_PRODUCTION_URL }}
          DSG_ONE_V1_PRODUCTION_URL: ${{ secrets.DSG_ONE_V1_PRODUCTION_URL }}
        run: |
          npm run dsg:production-flow-check || true
          npm run smoke:marketplace-readiness || true
          npm run smoke:security-rbac || true
          npm run smoke:entitlement || true

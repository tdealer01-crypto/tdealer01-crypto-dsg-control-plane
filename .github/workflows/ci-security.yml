name: CI Security Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Lockfile guard (deterministic install)
        run: |
          npm ci
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code -- package-lock.json

      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck

      - name: Shellcheck (lint shell scripts)
        run: |
          find . -path './node_modules' -prune -o -name '*.sh' -print0 | xargs -0 -r shellcheck || true

      - name: Gitleaks (scan final commit)
        run: |
          set -euo pipefail
          GITLEAKS_LOG_OPTS="-1 HEAD"
          echo "Running gitleaks with log opts: ${GITLEAKS_LOG_OPTS}"
          docker run --rm -v "$PWD":/repo zricethezav/gitleaks:v8.24.3 detect --source=/repo --config=/repo/.gitleaks.toml --log-opts="${GITLEAKS_LOG_OPTS}" --redact --report-format=json --report-path=/repo/gitleaks-report.json

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore

      - name: npm audit (fail on high severity — production deps only)
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev

      - name: Enforce central error handler on API routes
        run: |
          chmod +x ./scripts/check-error-handlers.sh
          ./scripts/check-error-handlers.sh

      - name: Check request body safety (informational)
        run: |
          chmod +x ./scripts/check-request-body-safety.sh
          ./scripts/check-request-body-safety.sh

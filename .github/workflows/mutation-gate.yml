name: mutation-gate

on:
  push:
    branches: ["**"]
  pull_request:
    paths:
      - 'lib/**'
      - 'hooks/**'
      - 'store/**'
      - 'components/**'

permissions:
  contents: read

jobs:
  mutation:
    name: Stryker mutation testing (CTRL-008)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run mutation tests
        run: npx stryker run

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-${{ github.run_id }}
          path: reports/mutation/
          retention-days: 30
          if-no-files-found: warn

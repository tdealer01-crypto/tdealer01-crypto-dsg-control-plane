name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, claude/evidence-driven-compliance-E9TJR]
    paths:
      - 'apps/android/**'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build DSG Agent APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;34.0.0'

      - name: Create local.properties
        working-directory: apps/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        working-directory: apps/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        id: apk
        run: |
          DATE=$(date +%Y%m%d)
          SRC=apps/android/app/build/outputs/apk/debug/app-debug.apk
          DEST=dsg-agent-${DATE}-debug.apk
          cp "$SRC" "$DEST"
          echo "name=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsg-agent-apk
          path: ${{ steps.apk.outputs.name }}
          retention-days: 30

      - name: Publish to GitHub Release (android-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "DSG Agent — latest debug APK"
          prerelease: true
          make_latest: false
          files: ${{ steps.apk.outputs.name }}
          body: |
            ## DSG Agent Android — latest build

            **Features:**
            - ⚡ Owner Autonomous Mode — bypass all approval gates
            - 🤖 DadBot AI Chat — real-time Thai/English via Claude Haiku
            - 📁 Full File Manager — read/rename/move/delete
            - 🔒 Audit log every action

            Built from `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

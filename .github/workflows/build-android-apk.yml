name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, claude/evidence-driven-compliance-E9TJR]
    paths:
      - 'apps/android/**'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build DSG Agent APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        working-directory: apps/android
        shell: bash
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee android-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "==== Android build root-error context ===="
            sed -n '/What went wrong:/,/Try:/p' android-build.log | sed -n '1,160p' || true
            grep -n -E "FAILURE:|What went wrong:|Execution failed for task|error:" android-build.log || true
            exit "$status"
          fi

      - name: Rename APK
        id: apk
        run: |
          DATE=$(date +%Y%m%d)
          SRC=apps/android/app/build/outputs/apk/debug/app-debug.apk
          DEST=dsg-agent-${DATE}-debug.apk
          cp "$SRC" "$DEST"
          echo "name=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsg-agent-apk
          path: ${{ steps.apk.outputs.name }}
          retention-days: 30

      - name: Publish to GitHub Release (android-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "DSG Agent — latest debug APK"
          prerelease: true
          make_latest: false
          files: ${{ steps.apk.outputs.name }}
          body: |
            ## DSG Agent Android — latest build

            **Features:**
            - ⚡ Owner Autonomous Mode — bypass all approval gates
            - 🤖 DadBot AI Chat — real-time Thai/English via Claude Haiku
            - 📁 Full File Manager — read/rename/move/delete
            - 🔒 Audit log every action

            Built from `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      # Build-safe Supabase public envs for CI (prefer repo variables/secrets, then fallback to deterministic placeholders)
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-anon-key-placeholder' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-anon-key-placeholder' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Verify runtime contract test files exist
        run: |
          test -f tests/integration/api/spine-execute.test.ts
          test -f tests/integration/api/intent.test.ts
          test -f tests/integration/api/execute-compat.test.ts
          test -f tests/unit/security/cors.test.ts

      - name: Runtime contract test subset
        run: |
          npm run test -- \
            tests/integration/api/spine-execute.test.ts \
            tests/integration/api/intent.test.ts \
            tests/integration/api/execute-compat.test.ts \
            tests/unit/security/cors.test.ts

      - name: Full test suite
        run: npm run test

      - name: i18n — no Thai text in source
        run: |
          count=$(grep -rP "[฀-๿]" app/ components/ lib/ \
            --include="*.ts" --include="*.tsx" \
            2>/dev/null | grep -v "^\s*//" | wc -l)
          echo "Thai character matches: $count"
          if [ "$count" -gt 0 ]; then
            echo "❌ Thai text found in source:"
            grep -rnP "[฀-๿]" app/ components/ lib/ \
              --include="*.ts" --include="*.tsx" | grep -v "^\s*//"
            exit 1
          fi
          echo "✅ No Thai text in app/ components/ lib/"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Z3 proof dependencies
        run: npm run proof:install

      - name: Answer Gate formal proofs
        run: npm run proof:answer-gate

      - name: Build
        run: npm run build

      - name: Production manifest gate
        run: npm run verify:production-manifest

      - name: Live DB tests
        if: >
          env.NEXT_PUBLIC_SUPABASE_URL != 'https://example.supabase.co' &&
          env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: npm run test:live:db:required
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

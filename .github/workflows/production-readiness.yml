name: Production Readiness Check

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  VERCEL_ORG_ID: team_n189mlAdVHR6cGGiaAwsKzQ0
  VERCEL_PROJECT_ID: prj_k02PTNzCJRBN5CcRtg6hFdd0HjuW

jobs:
  preflight-env-check:
    name: Preflight Environment Check
    runs-on: ubuntu-latest
    outputs:
      critical_status: ${{ steps.check_critical.outputs.status }}
      required_status: ${{ steps.check_required.outputs.status }}
      billing_status: ${{ steps.check_billing.outputs.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull environment variables from Vercel
        run: |
          export VERCEL_ORG_ID=${{ env.VERCEL_ORG_ID }}
          export VERCEL_PROJECT_ID=${{ env.VERCEL_PROJECT_ID }}
          vercel env pull .env.check --environment production --token ${{ secrets.VERCEL_TOKEN }}

      - name: Check CRITICAL variables
        id: check_critical
        run: |
          CRITICAL_VARS="NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY DSG_CORE_MODE"
          MISSING=""
          for var in $CRITICAL_VARS; do
            if ! grep -q "^${var}=" .env.check || grep "^${var}=$" .env.check > /dev/null; then
              MISSING="$MISSING $var"
            fi
          done
          
          if [ -z "$MISSING" ]; then
            echo "status=pass" >> $GITHUB_OUTPUT
            echo "✓ All CRITICAL variables present"
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "✗ Missing CRITICAL variables:$MISSING"
            exit 1
          fi

      - name: Check REQUIRED variables
        id: check_required
        run: |
          REQUIRED_VARS="APP_URL NEXT_PUBLIC_APP_URL"
          MISSING=""
          for var in $REQUIRED_VARS; do
            if ! grep -q "^${var}=" .env.check || grep "^${var}=$" .env.check > /dev/null; then
              MISSING="$MISSING $var"
            fi
          done
          
          if [ -z "$MISSING" ]; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "⚠ Missing REQUIRED variables:$MISSING"
          fi

      - name: Check BILLING variables
        id: check_billing
        run: |
          BILLING_VARS="STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PRICE_PRO_MONTHLY STRIPE_PRICE_BUSINESS_MONTHLY STRIPE_PRICE_ENTERPRISE_MONTHLY"
          MISSING=""
          for var in $BILLING_VARS; do
            if ! grep -q "^${var}=" .env.check || grep "^${var}=$" .env.check > /dev/null; then
              MISSING="$MISSING $var"
            fi
          done
          
          if [ -z "$MISSING" ]; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "⚠ Missing BILLING variables:$MISSING"
          fi

      - name: Generate preflight summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🔍 Preflight Environment Check
          
          | Category | Status |
          |----------|--------|
          | CRITICAL | ${{ steps.check_critical.outputs.status == 'pass' && '✅ Pass' || '❌ Fail' }} |
          | REQUIRED | ${{ steps.check_required.outputs.status == 'pass' && '✅ Pass' || '⚠️ Warn' }} |
          | BILLING  | ${{ steps.check_billing.outputs.status == 'pass' && '✅ Pass' || '⚠️ Warn' }} |
          
          EOF

      - name: Cleanup
        if: always()
        run: rm -f .env.check

  db-migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    needs: preflight-env-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Link to Supabase project
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "${{ secrets.SUPABASE_DB_PASSWORD }}" | supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Check pending migrations
        id: migration_check
        run: |
          OUTPUT=$(supabase db push --dry-run 2>&1 || true)
          echo "$OUTPUT" | tee /tmp/migration_output.txt
          
          if echo "$OUTPUT" | grep -q "No pending migrations"; then
            echo "status=pass" >> $GITHUB_OUTPUT
            echo "All 14 migrations applied" >> $GITHUB_STEP_SUMMARY
          elif echo "$OUTPUT" | grep -q "pending"; then
            echo "status=warn" >> $GITHUB_OUTPUT
            echo "Pending migrations found" >> $GITHUB_STEP_SUMMARY
          else
            echo "status=pass" >> $GITHUB_OUTPUT
          fi

      - name: Generate migration summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📊 Database Migration Status
          
          EOF
          
          if [ -f /tmp/migration_output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/migration_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: preflight-env-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check /api/health endpoint
        id: health_check
        run: |
          RESPONSE=$(curl -sS -o /tmp/health.json -w "%{http_code}" https://tdealer01-crypto-dsg-control-plane.vercel.app/api/health)
          HTTP_CODE="${RESPONSE: -3}"
          
          if [ "$HTTP_CODE" = "200" ]; then
            if jq -e '.ok == true' /tmp/health.json > /dev/null 2>&1; then
              echo "status=pass" >> $GITHUB_OUTPUT
              echo "✓ Health check passed"
            else
              echo "status=fail" >> $GITHUB_OUTPUT
              echo "✗ Health check: ok != true"
            fi
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "✗ HTTP $HTTP_CODE"
          fi

      - name: Check /api/core/monitor endpoint
        id: core_monitor
        run: |
          RESPONSE=$(curl -sS https://tdealer01-crypto-dsg-control-plane.vercel.app/api/core/monitor)
          
          if echo "$RESPONSE" | jq -e '.readiness_status' > /dev/null 2>&1; then
            READINESS=$(echo "$RESPONSE" | jq -r '.readiness_status')
            echo "readiness_status=$READINESS" >> $GITHUB_OUTPUT
            if [ "$READINESS" = "ready" ]; then
              echo "✓ Core monitor: ready"
            else
              echo "⚠ Core monitor: $READINESS"
            fi
          else
            echo "readiness_status=error" >> $GITHUB_OUTPUT
            echo "✗ Core monitor check failed"
          fi

      - name: Check /api/usage endpoint
        id: usage_check
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" https://tdealer01-crypto-dsg-control-plane.vercel.app/api/usage)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=pass" >> $GITHUB_OUTPUT
            echo "✓ Usage endpoint OK"
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "✗ Usage endpoint HTTP $HTTP_CODE"
          fi

      - name: Handle health check failure (scheduled)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Production Health Check Failed',
              body: `Health check failed at ${new Date().toISOString()}

Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['production-down']
            })

      - name: Fail on health check failure (non-scheduled)
        if: failure() && github.event_name != 'schedule'
        run: exit 1

      - name: Generate health check summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🏥 Production Health Status
          
          | Endpoint | Status | Details |
          |----------|--------|---------|
          | /api/health | ${{ steps.health_check.outputs.status == 'pass' && '✅' || '❌' }} | ${{ steps.health_check.outputs.status }} |
          | /api/core/monitor | ${{ steps.core_monitor.outputs.readiness_status == 'ready' && '✅' || '⚠️' }} | ${{ steps.core_monitor.outputs.readiness_status }} |
          | /api/usage | ${{ steps.usage_check.outputs.status == 'pass' && '✅' || '❌' }} | ${{ steps.usage_check.outputs.status }} |
          
          EOF

  summary:
    name: Readiness Summary
    runs-on: ubuntu-latest
    needs: [preflight-env-check, db-migration-check, health-check]
    if: always()
    steps:
      - name: Generate final summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 📋 Production Readiness Summary
          
          ## Results by Component
          
          ### Environment Variables
          - CRITICAL: ${{ needs.preflight-env-check.outputs.critical_status == 'pass' && '✅ Pass' || '❌ Fail' }}
          - REQUIRED: ${{ needs.preflight-env-check.outputs.required_status == 'pass' && '✅ Pass' || '⚠️ Warn' }}
          - BILLING: ${{ needs.preflight-env-check.outputs.billing_status == 'pass' && '✅ Pass' || '⚠️ Warn' }}
          
          ### Database
          - Migration Status: ${{ needs.db-migration-check.result == 'success' && '✅ Pass' || '⚠️ Check logs' }}
          
          ### Health Checks
          - API Endpoints: ${{ needs.health-check.result == 'success' && '✅ Healthy' || '⚠️ Degraded' }}
          
          ## Overall Status
          ${{ needs.preflight-env-check.result == 'success' && needs.health-check.result == 'success' && '### ✅ Production Ready' || '### ⚠️ Review Required' }}
          
          Generated: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          EOF

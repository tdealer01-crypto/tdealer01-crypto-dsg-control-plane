<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Screenshot 1: Dashboard Overview -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A"/>
      <stop offset="100%" style="stop-color:#141B2D"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2238"/>
      <stop offset="100%" style="stop-color:#141B2D"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="#2A3A5E" stroke-width="1" rx="12"/>
  
  <!-- Header -->
  <text x="80" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">DSG Governance Gate</text>
  <text x="80" y="135" font-family="system-ui" font-size="14" fill="#6B8ABE">Production • tdealer01-crypto-dsg-control-plane.vercel.app</text>
  
  <!-- Metric Cards -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Card 1: Evaluations Today -->
    <rect x="80" y="180" width="340" height="160" fill="url(#cardGrad)" stroke="#2A3A5E" stroke-width="1" rx="12"/>
    <text x="100" y="215" font-size="13" fill="#6B8ABE" font-weight="500">EVALUATIONS TODAY</text>
    <text x="100" y="275" font-size="42" font-weight="700" fill="#FFFFFF">2,847</text>
    <text x="100" y="310" font-size="12" fill="#10B981">+12% vs yesterday</text>
    
    <!-- Card 2: Pending Reviews -->
    <rect x="460" y="180" width="340" height="160" fill="url(#cardGrad)" stroke="#F59E0B" stroke-width="1" rx="12" filter="url(#glow)"/>
    <text x="480" y="215" font-size="13" fill="#F59E0B" font-weight="500">PENDING REVIEWS</text>
    <text x="480" y="275" font-size="42" font-weight="700" fill="#F59E0B">3</text>
    <text x="480" y="310" font-size="12" fill="#6B8ABE">Awaiting approval</text>
    
    <!-- Card 3: Blocked Operations -->
    <rect x="840" y="180" width="340" height="160" fill="url(#cardGrad)" stroke="#EF4444" stroke-width="1" rx="12"/>
    <text x="860" y="215" font-size="13" fill="#EF4444" font-weight="500">BLOCKED OPERATIONS</text>
    <text x="860" y="275" font-size="42" font-weight="700" fill="#EF4444">0</text>
    <text x="860" y="310" font-size="12" fill="#6B8ABE">All clear</text>
    
    <!-- Card 4: Uptime -->
    <rect x="1220" y="180" width="340" height="160" fill="url(#cardGrad)" stroke="#10B981" stroke-width="1" rx="12"/>
    <text x="1240" y="215" font-size="13" fill="#10B981" font-weight="500">UPTIME (30d)</text>
    <text x="1240" y="275" font-size="42" font-weight="700" fill="#10B981">99.99%</text>
    <text x="1240" y="310" font-size="12" fill="#6B8ABE">SLA: 99.9%</text>
  </g>
  
  <!-- Connected Accounts Table -->
  <rect x="80" y="380" width="1480" height="460" fill="url(#cardGrad)" stroke="#2A3A5E" stroke-width="1" rx="12"/>
  <text x="100" y="420" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Connected Accounts (247 active)</text>
  
  <!-- Table Header -->
  <rect x="80" y="440" width="1480" height="48" fill="#0F1628" rx="8"/>
  <g font-family="system-ui" font-size="12" fill="#6B8ABE" font-weight="500">
    <text x="100" y="473">Account</text>
    <text x="350" y="473">Status</text>
    <text x="500" y="473">Evaluations (24h)</text>
    <text x="700" y="473">Reviews</text>
    <text x="850" y="473">Fail-Safe</text>
    <text x="1000" y="473">Last Active</text>
    <text x="1150" y="473">Policies</text>
  </g>
  
  <!-- Table Rows -->
  <g font-family="system-ui" font-size="13">
    <!-- Row 1 -->
    <rect x="80" y="495" width="1480" height="52" fill="#151D33"/>
    <text x="100" y="530" fill="#FFFFFF" font-weight="500">acct_1AbC... (Merchant Store)</text>
    <circle cx="370" cy="521" r="6" fill="#10B981"/>
    <text x="385" y="526" fill="#10B981" font-size="12">Active</text>
    <text x="500" y="530" fill="#E5E7EB">1,234</text>
    <text x="700" y="530" fill="#F59E0B" font-weight="500">2</text>
    <text x="850" y="530" fill="#6B8ABE">Fail-Open</text>
    <text x="1000" y="530" fill="#9CA3AF">2 min ago</text>
    <text x="1150" y="530" fill="#9CA3AF">8 policies</text>
    
    <!-- Row 2 -->
    <rect x="80" y="555" width="1480" height="52" fill="#1A2238"/>
    <text x="100" y="590" fill="#FFFFFF" font-weight="500">acct_2DeF... (Platform Payments)</text>
    <circle cx="370" cy="581" r="6" fill="#10B981"/>
    <text x="385" y="586" fill="#10B981" font-size="12">Active</text>
    <text x="500" y="590" fill="#E5E7EB">892</text>
    <text x="700" y="590" fill="#6B8ABE">0</text>
    <text x="850" y="590" fill="#EF4444">Fail-Closed</text>
    <text x="1000" y="590" fill="#9CA3AF">5 min ago</text>
    <text x="1150" y="590" fill="#9CA3AF">12 policies</text>
    
    <!-- Row 3 -->
    <rect x="80" y="615" width="1480" height="52" fill="#151D33"/>
    <text x="100" y="650" fill="#FFFFFF" font-weight="500">acct_3GhI... (SaaS Billing)</text>
    <circle cx="370" cy="641" r="6" fill="#10B981"/>
    <text x="385" y="646" fill="#10B981" font-size="12">Active</text>
    <text x="500" y="650" fill="#E5E7EB">2,104</text>
    <text x="700" y="650" fill="#F59E0B" font-weight="500">1</text>
    <text x="850" y="650" fill="#6B8ABE">Fail-Open</text>
    <text x="1000" y="650" fill="#9CA3AF">1 min ago</text>
    <text x="1150" y="650" fill="#9CA3AF">6 policies</text>
    
    <!-- Row 4 -->
    <rect x="80" y="675" width="1480" height="52" fill="#1A2238"/>
    <text x="100" y="710" fill="#FFFFFF" font-weight="500">acct_4JkL... (Marketplace)</text>
    <circle cx="370" cy="701" r="6" fill="#EF4444"/>
    <text x="385" y="706" fill="#EF4444" font-size="12">Revoked</text>
    <text x="500" y="710" fill="#E5E7EB">0</text>
    <text x="700" y="710" fill="#6B8ABE">0</text>
    <text x="850" y="710" fill="#9CA3AF">—</text>
    <text x="1000" y="710" fill="#9CA3AF">3 days ago</text>
    <text x="1150" y="710" fill="#9CA3AF">4 policies</text>
    
    <!-- Row 5 -->
    <rect x="80" y="735" width="1480" height="52" fill="#151D33"/>
    <text x="100" y="770" fill="#FFFFFF" font-weight="500">acct_5MnO... (Fintech Lending)</text>
    <circle cx="370" cy="761" r="6" fill="#10B981"/>
    <text x="385" y="766" fill="#10B981" font-size="12">Active</text>
    <text x="500" y="770" fill="#E5E7EB">3,456</text>
    <text x="700" y="770" fill="#EF4444" font-weight="500">3</text>
    <text x="850" y="770" fill="#EF4444">Fail-Closed</text>
    <text x="1000" y="770" fill="#9CA3AF">Just now</text>
    <text x="1150" y="770" fill="#9CA3AF">15 policies</text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="80" y="820" width="1480" height="40" fill="#0F1628" rx="8"/>
  <text x="160" y="846" font-family="system-ui" font-size="12" fill="#6B8ABE">Showing 5 of 247 accounts • Export CSV • Refresh</text>
  <rect x="1400" y="825" width="140" height="30" fill="#1E293B" rx="6"/>
  <text x="1470" y="844" font-family="system-ui" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="500">View All →</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Screenshot 5: Connect Onboarding -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#F1F3F5"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F8F9FA"/>
    </linearGradient>
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#635BFF"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  
  <!-- Centered Card -->
  <g transform="translate(400, 120)">
    <rect width="800" height="660" fill="url(#cardGrad)" rx="16" filter="url(#shadow)"/>
    
    <!-- Stripe Header -->
    <rect x="0" y="0" width="800" height="80" fill="#635BFF" rx="16 16 0 0"/>
    <g font-family="system-ui, -apple-system, sans-serif">
      <rect x="40" y="24" width="32" height="32" rx="8" fill="#FFFFFF"/>
      <text x="40" y="46" fill="#635BFF" text-anchor="middle" font-size="18" font-weight="700">S</text>
      <text x="90" y="48" fill="#FFFFFF" font-size="20" font-weight="600">Stripe</text>
      <text x="90" y="66" fill="#E0DDFF" font-size="12">Connect Onboarding</text>
    </g>
    
    <!-- Main Content -->
    <g font-family="system-ui, -apple-system, sans-serif">
      <!-- Step Indicator -->
      <text x="60" y="130" fill="#495057" font-size="14" font-weight="500">Step 1 of 2</text>
      <text x="60" y="105" fill="#212529" font-size="24" font-weight="700">DSG Governance Gate wants to access your Stripe account</text>
      
      <!-- Description -->
      <text x="60" y="165" fill="#6C757D" font-size="15" line-height="1.5">This will allow DSG Governance Gate to:</text>
      
      <!-- Permissions List -->
      <g transform="translate(60, 190)">
        <g font-size="14" fill="#212529">
          <!-- Item 1 -->
          <circle cx="12" cy="20" r="8" fill="none" stroke="#635BFF" stroke-width="2"/>
          <text x="32" y="25" font-weight="500">Read customer information</text>
          <text x="32" y="42" fill="#6C757D" font-size="12">View customer list, details, and payment history</text>
          
          <!-- Item 2 -->
          <circle cx="12" cy="80" r="8" fill="none" stroke="#635BFF" stroke-width="2"/>
          <text x="32" y="85" font-weight="500">Create and manage charges</text>
          <text x="32" y="102" fill="#6C757D" font-size="12">Process payments, refunds, and handle disputes</text>
          
          <!-- Item 3 -->
          <circle cx="12" cy="140" r="8" fill="none" stroke="#635BFF" stroke-width="2"/>
          <text x="32" y="145" font-weight="500">Read payouts and balances</text>
          <text x="32" y="162" fill="#6C757D" font-size="12">View payout schedule, history, and account balance</text>
          
          <!-- Item 4 -->
          <circle cx="12" cy="200" r="8" fill="none" stroke="#635BFF" stroke-width="2"/>
          <text x="32" y="205" font-weight="500">Manage subscription information</text>
          <text x="32" y="222" fill="#6C757D" font-size="12">View and update subscription plans and billing cycles</text>
          
          <!-- Item 5 -->
          <circle cx="12" cy="260" r="8" fill="none" stroke="#635BFF" stroke-width="2"/>
          <text x="32" y="265" font-weight="500">Read dispute information</text>
          <text x="32" y="282" fill="#6C757D" font-size="12">View dispute details and evidence for governance</text>
          
          <!-- Item 6 -->
          <circle cx="12" cy="320" r="8" fill="none" stroke="#635BFF" stroke-width="2"/>
          <text x="32" y="325" font-weight="500">Governance: Evaluate policies before execution</text>
          <text x="32" y="342" fill="#6C757D" font-size="12">Pre-execution gating for charges, payouts, refunds</text>
        </g>
      </g>
      
      <!-- DSG Branding -->
      <rect x="60" y="560" width="680" height="80" fill="#F8F9FA" rx="12" stroke="#E9ECEF" stroke-width="1"/>
      <g transform="translate(80, 575)">
        <rect width="40" height="40" rx="8" fill="url(#stripeGrad)"/>
        <text x="40" y="30" fill="#635BFF" text-anchor="middle" font-size="18" font-weight="700">D</text>
        <text x="60" y="28" fill="#212529" font-size="16" font-weight="600">DSG Governance Gate</text>
        <text x="60" y="48" fill="#6C757D" font-size="13">Runtime governance for AI agents & Stripe operations</text>
        <text x="600" y="35" fill="#6C757D" font-size="12" text-anchor="end">Verified by Stripe</text>
      </g>
      
      <!-- Bottom Action Buttons -->
      <g transform="translate(60, 660)">
        <text x="340" y="25" fill="#6C757D" font-size="13" text-anchor="middle">By allowing access, you agree to Stripe's <a href="#" style="fill:#635BFF; text-decoration:none">Connect Service Agreement</a> and <a href="#" style="fill:#635BFF; text-decoration:none">DSG Terms of Service</a>.</text>
      </g>
    </g>
  </g>
  
  <!-- Allow Button (Sticky bottom) -->
  <rect x="600" y="800" width="400" height="56" rx="28" fill="url(#stripeGrad)" filter="url(#shadow)"/>
  <text x="800" y="838" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF" text-anchor="middle">Allow access</text>
</svg>
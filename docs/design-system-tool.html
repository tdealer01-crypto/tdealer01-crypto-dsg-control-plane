<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSG Design System Tool</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dsg-black: #050507;
            --dsg-black-2: #090b12;
            --dsg-panel: rgba(9, 11, 18, 0.86);
            --dsg-panel-2: rgba(14, 18, 28, 0.92);
            --dsg-red: #e10600;
            --dsg-red-deep: #7f0509;
            --dsg-red-glow: rgba(225, 6, 0, 0.22);
            --dsg-gold: #d4af37;
            --dsg-gold-soft: #f7dc78;
            --dsg-gold-glow: rgba(212, 175, 55, 0.13);
            --dsg-sapphire: #0f52ba;
            --dsg-sapphire-soft: #4f8cff;
            --dsg-sapphire-glow: rgba(15, 82, 186, 0.28);
            --dsg-line: rgba(247, 220, 120, 0.16);
            --dsg-text: #f8fafc;
            --dsg-muted: #aab3c5;
            --dsg-success: #4caf50;
            --dsg-warning: #ff9800;
            --dsg-error: #e10600;
            --dsg-info: #4f8cff;
        }

        * {
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        body {
            background: linear-gradient(180deg, var(--dsg-black), var(--dsg-black-2) 52%, var(--dsg-black));
            color: var(--dsg-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container-tool {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .card {
            border: 1px solid var(--dsg-line);
            background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02)), var(--dsg-panel);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 22px 80px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .color-swatch {
            width: 100%;
            height: 100px;
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-swatch:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--dsg-gold-soft), var(--dsg-gold));
            color: #060608;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 14px 34px rgba(212, 175, 55, 0.22);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(212, 175, 55, 0.28);
        }

        .btn-secondary {
            background: rgba(15, 82, 186, 0.18);
            color: #dbeafe;
            border: 1px solid rgba(79, 140, 255, 0.42);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: rgba(15, 82, 186, 0.26);
            border-color: rgba(79, 140, 255, 0.6);
            box-shadow: 0 0 12px var(--dsg-sapphire-glow);
        }

        .input-field {
            background: rgba(9, 11, 18, 0.5);
            border: 1px solid var(--dsg-line);
            color: var(--dsg-text);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            background: rgba(9, 11, 18, 0.8);
            border-color: var(--dsg-sapphire-soft);
            box-shadow: 0 0 12px var(--dsg-sapphire-glow);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid var(--dsg-line);
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--dsg-muted);
            padding: 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 600;
        }

        .tab-btn.active {
            color: var(--dsg-gold-soft);
            border-bottom-color: var(--dsg-gold-soft);
        }

        .tab-btn:hover {
            color: var(--dsg-text);
        }

        .preview-box {
            background: rgba(5, 5, 7, 0.95);
            border-left: 3px solid var(--dsg-gold-soft);
            border-radius: 6px;
            padding: 1.5rem;
            margin: 1rem 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .component-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .component-item {
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
            border: 1px solid var(--dsg-line);
        }

        @media (max-width: 768px) {
            .container-tool {
                padding: 1rem;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .tabs {
                gap: 0.5rem;
            }

            .tab-btn {
                padding: 0.75rem;
                font-size: 0.875rem;
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(212, 175, 55, 0.1);
            color: var(--dsg-gold-soft);
            border: 1px solid rgba(247, 220, 120, 0.34);
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .contrast-ratio {
            font-weight: 600;
            padding: 0.5rem 1rem;
            background: rgba(15, 82, 186, 0.1);
            border-radius: 4px;
            margin-top: 0.5rem;
        }

        .contrast-ratio.pass {
            color: var(--dsg-success);
        }

        .contrast-ratio.fail {
            color: var(--dsg-error);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('colors');
            const [selectedColor, setSelectedColor] = useState('#e10600');
            const [theme, setTheme] = useState('dark');
            const [fontSize, setFontSize] = useState(16);
            const [copiedColor, setCopiedColor] = useState(null);

            const colors = {
                primary: [
                    { name: 'Red', value: '#e10600', usage: 'CTAs, alerts, errors' },
                    { name: 'Sapphire', value: '#0f52ba', usage: 'Primary brand, trust' },
                    { name: 'Gold', value: '#d4af37', usage: 'Premium, highlights' },
                    { name: 'Gold Soft', value: '#f7dc78', usage: 'Gradients, accents' },
                ],
                dark: [
                    { name: 'Black', value: '#050507', usage: 'Primary background' },
                    { name: 'Black 2', value: '#090b12', usage: 'Secondary background' },
                    { name: 'Text', value: '#f8fafc', usage: 'Primary text' },
                    { name: 'Muted', value: '#aab3c5', usage: 'Secondary text' },
                ],
                semantic: [
                    { name: 'Success', value: '#4caf50', usage: 'Confirmations' },
                    { name: 'Warning', value: '#ff9800', usage: 'Cautions' },
                    { name: 'Error', value: '#e10600', usage: 'Errors' },
                    { name: 'Info', value: '#4f8cff', usage: 'Notifications' },
                ]
            };

            const typography = [
                { name: 'H1', size: 48, weight: 700, lineHeight: 1.2, usage: 'Page Title' },
                { name: 'H2', size: 36, weight: 700, lineHeight: 1.3, usage: 'Section Header' },
                { name: 'H3', size: 28, weight: 600, lineHeight: 1.3, usage: 'Subsection' },
                { name: 'Body', size: 16, weight: 400, lineHeight: 1.6, usage: 'Main text' },
                { name: 'Small', size: 14, weight: 400, lineHeight: 1.5, usage: 'Helper text' },
                { name: 'Code', size: 14, weight: 500, lineHeight: 1.5, usage: 'Code blocks' },
            ];

            const components = [
                { name: 'Button Primary', bg: 'linear-gradient(135deg, #f7dc78, #d4af37)', text: '#060608' },
                { name: 'Button Secondary', bg: 'rgba(15, 82, 186, 0.18)', text: '#dbeafe' },
                { name: 'Button Red', bg: 'rgba(225, 6, 0, 0.14)', text: '#fecaca' },
                { name: 'Card', bg: 'var(--dsg-panel)', text: '#f8fafc' },
            ];

            const spacing = [4, 8, 16, 24, 32, 48, 64];

            const copyToClipboard = (text, color) => {
                navigator.clipboard.writeText(text);
                setCopiedColor(color);
                setTimeout(() => setCopiedColor(null), 2000);
            };

            const getContrastRatio = (hex1, hex2) => {
                const getLum = (hex) => {
                    const rgb = parseInt(hex.slice(1), 16);
                    const r = (rgb >> 16) & 0xff;
                    const g = (rgb >> 8) & 0xff;
                    const b = (rgb >> 0) & 0xff;
                    return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                };
                const lum1 = getLum(hex1);
                const lum2 = getLum(hex2);
                const lighter = Math.max(lum1, lum2);
                const darker = Math.min(lum1, lum2);
                return ((lighter + 0.05) / (darker + 0.05)).toFixed(2);
            };

            const contrast = getContrastRatio(selectedColor, '#050507');
            const isAccessible = parseFloat(contrast) >= 4.5;

            return (
                <div className="container-tool fade-in">
                    {/* Header */}
                    <div className="card" style={{ marginBottom: '2rem' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '1rem', flexWrap: 'wrap' }}>
                            <div>
                                <h1 style={{ fontSize: '2rem', fontWeight: 700, marginBottom: '0.5rem' }}>DSG Design System</h1>
                                <p style={{ color: 'var(--dsg-muted)' }}>Interactive color, typography & component showcase</p>
                            </div>
                            <div style={{ display: 'flex', gap: '1rem' }}>
                                <button className="btn-secondary" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}>
                                    {theme === 'dark' ? '☀️ Light' : '🌙 Dark'}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="tabs">
                        {['colors', 'typography', 'components', 'spacing'].map(tab => (
                            <button
                                key={tab}
                                className={`tab-btn ${activeTab === tab ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab)}
                            >
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </div>

                    {/* Colors Tab */}
                    {activeTab === 'colors' && (
                        <div className="fade-in">
                            <div className="grid-2">
                                <div>
                                    <div className="card">
                                        <h2 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: '1rem' }}>Primary Colors</h2>
                                        {colors.primary.map(color => (
                                            <div key={color.value} style={{ marginBottom: '1rem', cursor: 'pointer' }} onClick={() => copyToClipboard(color.value, color.value)}>
                                                <div className="color-swatch" style={{ background: color.value }}>
                                                    <div>{color.name}</div>
                                                    <div>{copiedColor === color.value ? '✓ Copied' : color.value}</div>
                                                </div>
                                                <p style={{ fontSize: '0.875rem', color: 'var(--dsg-muted)', marginTop: '0.5rem' }}>{color.usage}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <div className="card">
                                        <h2 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: '1rem' }}>Dark Theme & Semantic</h2>
                                        {colors.dark.map(color => (
                                            <div key={color.value} style={{ marginBottom: '1rem', cursor: 'pointer' }} onClick={() => copyToClipboard(color.value, color.value)}>
                                                <div className="color-swatch" style={{ background: color.value, border: '1px solid var(--dsg-line)' }}>
                                                    <div>{color.name}</div>
                                                    <div>{copiedColor === color.value ? '✓ Copied' : color.value}</div>
                                                </div>
                                                <p style={{ fontSize: '0.875rem', color: 'var(--dsg-muted)', marginTop: '0.5rem' }}>{color.usage}</p>
                                            </div>
                                        ))}

                                        <div style={{ marginTop: '2rem', paddingTop: '2rem', borderTop: '1px solid var(--dsg-line)' }}>
                                            <h3 style={{ fontSize: '1rem', fontWeight: 700, marginBottom: '1rem' }}>Semantic Colors</h3>
                                            {colors.semantic.map(color => (
                                                <div key={color.value} style={{ marginBottom: '0.75rem' }}>
                                                    <div className="color-swatch" style={{ background: color.value, height: '60px' }}>
                                                        <div>{color.name}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Color Accessibility Checker */}
                            <div className="card" style={{ marginTop: '2rem' }}>
                                <h2 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: '1rem' }}>Accessibility Checker</h2>
                                <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', alignItems: 'center' }}>
                                    <input
                                        type="color"
                                        value={selectedColor}
                                        onChange={(e) => setSelectedColor(e.target.value)}
                                        style={{ width: '60px', height: '40px', cursor: 'pointer', borderRadius: '4px' }}
                                    />
                                    <input
                                        type="text"
                                        value={selectedColor}
                                        onChange={(e) => setSelectedColor(e.target.value)}
                                        className="input-field"
                                        style={{ maxWidth: '200px' }}
                                    />
                                </div>
                                <div className="preview-box" style={{ background: selectedColor, color: selectedColor === '#050507' ? '#f8fafc' : '#050507' }}>
                                    <div style={{ textAlign: 'center' }}>
                                        <div style={{ fontSize: '2rem', fontWeight: 700 }}>Sample Text</div>
                                        <div style={{ fontSize: '0.875rem', marginTop: '0.5rem' }}>Preview with selected color</div>
                                    </div>
                                </div>
                                <div className={`contrast-ratio ${isAccessible ? 'pass' : 'fail'}`}>
                                    Contrast Ratio: {contrast}:1 {isAccessible ? '✓ WCAG AA Pass' : '✗ WCAG AA Fail'}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Typography Tab */}
                    {activeTab === 'typography' && (
                        <div className="fade-in">
                            <div className="card">
                                <h2 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: '1.5rem' }}>Typography Scale</h2>
                                {typography.map(type => (
                                    <div key={type.name} style={{ marginBottom: '2rem', paddingBottom: '2rem', borderBottom: '1px solid var(--dsg-line)' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.75rem' }}>
                                            <div>
                                                <h3 style={{ fontSize: type.size, fontWeight: type.weight, lineHeight: type.lineHeight, margin: 0 }}>
                                                    {type.name}
                                                </h3>
                                            </div>
                                            <span className="badge">{type.size}px • {type.weight}</span>
                                        </div>
                                        <p style={{ fontSize: '0.875rem', color: 'var(--dsg-muted)' }}>
                                            Line height: {type.lineHeight} • {type.usage}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Components Tab */}
                    {activeTab === 'components' && (
                        <div className="fade-in">
                            <div className="card">
                                <h2 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: '1.5rem' }}>Button Components</h2>
                                <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginBottom: '2rem' }}>
                                    <button className="btn-primary">Primary Button</button>
                                    <button className="btn-secondary">Secondary Button</button>
                                    <button style={{ background: 'rgba(225, 6, 0, 0.14)', color: '#fecaca', border: '1px solid rgba(225, 6, 0, 0.38)', padding: '0.75rem 1.5rem', borderRadius: '8px', fontWeight: 600, cursor: 'pointer' }}>
                                        Danger Button
                                    </button>
                                </div>

                                <h3 style={{ fontSize: '1rem', fontWeight: 700, marginBottom: '1rem', marginTop: '2rem' }}>Button States</h3>
                                <div className="component-grid">
                                    <div className="component-item" style={{ background: 'linear-gradient(135deg, #f7dc78, #d4af37)', color: '#060608' }}>
                                        <strong>Hover State</strong>
                                        <div style={{ fontSize: '0.75rem', marginTop: '0.5rem' }}>Elevated shadow</div>
                                    </div>
                                    <div className="component-item" style={{ background: '#d4af37', color: '#060608' }}>
                                        <strong>Active State</strong>
                                        <div style={{ fontSize: '0.75rem', marginTop: '0.5rem' }}>Pressed down</div>
                                    </div>
                                    <div className="component-item" style={{ opacity: 0.5, background: 'var(--dsg-muted)', color: '#000' }}>
                                        <strong>Disabled State</strong>
                                        <div style={{ fontSize: '0.75rem', marginTop: '0.5rem' }}>Reduced opacity</div>
                                    </div>
                                </div>

                                <h3 style={{ fontSize: '1rem', fontWeight: 700, marginBottom: '1rem', marginTop: '2rem' }}>Alert States</h3>
                                <div style={{ display: 'grid', gap: '1rem' }}>
                                    <div style={{ borderLeft: '3px solid var(--dsg-success)', background: 'rgba(76, 175, 80, 0.1)', padding: '1rem', borderRadius: '4px', color: 'var(--dsg-text)' }}>
                                        ✓ Success: Operation completed successfully
                                    </div>
                                    <div style={{ borderLeft: '3px solid var(--dsg-warning)', background: 'rgba(255, 152, 0, 0.1)', padding: '1rem', borderRadius: '4px', color: 'var(--dsg-text)' }}>
                                        ⚠ Warning: Please review before proceeding
                                    </div>
                                    <div style={{ borderLeft: '3px solid var(--dsg-error)', background: 'rgba(225, 6, 0, 0.1)', padding: '1rem', borderRadius: '4px', color: 'var(--dsg-text)' }}>
                                        ✕ Error: Something went wrong
                                    </div>
                                    <div style={{ borderLeft: '3px solid var(--dsg-info)', background: 'rgba(15, 82, 186, 0.1)', padding: '1rem', borderRadius: '4px', color: 'var(--dsg-text)' }}>
                                        ℹ Info: Additional information available
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Spacing Tab */}
                    {activeTab === 'spacing' && (
                        <div className="fade-in">
                            <div className="card">
                                <h2 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: '1.5rem' }}>Spacing Scale</h2>
                                <p style={{ color: 'var(--dsg-muted)', marginBottom: '2rem' }}>Base unit: 4px • All spacing values are multiples of 4px</p>
                                {spacing.map((value, idx) => (
                                    <div key={value} style={{ marginBottom: '2rem' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '0.75rem' }}>
                                            <div style={{ minWidth: '100px', fontWeight: 700 }}>
                                                {idx === 0 ? 'XS' : idx === 1 ? 'SM' : idx === 2 ? 'MD' : idx === 3 ? 'LG' : idx === 4 ? 'XL' : idx === 5 ? '2XL' : '3XL'}
                                            </div>
                                            <span className="badge">{value}px</span>
                                        </div>
                                        <div style={{ background: 'var(--dsg-sapphire)', height: `${value}px`, borderRadius: '4px', width: '100%', maxWidth: '300px' }}></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <div className="card" style={{ marginTop: '3rem', textAlign: 'center', color: 'var(--dsg-muted)' }}>
                        <p>DSG Design System v2.0 • All colors, typography & components verified for WCAG AA accessibility</p>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>

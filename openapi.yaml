openapi: 3.1.0
info:
  title: DSG Control Plane API
  version: 0.1.0
  description: |
    Public integration surface for DSG control plane.
servers:
  - url: https://tdealer01-crypto-dsg-control-plane.vercel.app
paths:
  /api/execute:
    post:
      summary: Execute an action through the DSG gate
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteRequest'
      responses:
        '200':
          description: Gate decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteResponse'
  /api/effect-callback:
    post:
      summary: Reconcile external effect status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EffectCallbackRequest'
      responses:
        '200':
          description: Callback reconciled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectCallbackResponse'
  /api/integrations/register:
    post:
      summary: Self-service integration provisioning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterIntegrationRequest'
      responses:
        '201':
          description: Integration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterIntegrationResponse'
  /api/integrations/webhooks:
    post:
      summary: Register integration webhook and CORS origins
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterWebhookRequest'
      responses:
        '200':
          description: Webhook upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterWebhookResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ExecuteRequest:
      type: object
      required: [agent_id, action, input]
      properties:
        agent_id:
          type: string
        action:
          type: string
        input:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
    ExecuteResponse:
      type: object
      required: [decision, execution_id]
      properties:
        decision:
          type: string
          enum: [ALLOW, BLOCK, REVIEW]
        execution_id:
          type: string
        reason:
          type: string
    EffectCallbackRequest:
      type: object
      required: [effect_id, status]
      properties:
        effect_id:
          type: string
        status:
          type: string
          enum: [succeeded, failed]
        payload:
          type: object
          additionalProperties: true
    EffectCallbackResponse:
      type: object
      properties:
        ok:
          type: boolean
        idempotent:
          type: boolean
    RegisterIntegrationRequest:
      type: object
      required: [email, app_name]
      properties:
        email:
          type: string
          format: email
        app_name:
          type: string
    RegisterIntegrationResponse:
      type: object
      required: [ok, org_id, agent_id, api_key]
      properties:
        ok:
          type: boolean
        org_id:
          type: string
        agent_id:
          type: string
        api_key:
          type: string
    RegisterWebhookRequest:
      type: object
      required: [agent_id, webhook_url]
      properties:
        agent_id:
          type: string
        webhook_url:
          type: string
          format: uri
        allowed_origins:
          type: array
          items:
            type: string
            format: uri
    RegisterWebhookResponse:
      type: object
      properties:
        ok:
          type: boolean
        integration:
          type: object
          properties:
            id:
              type: string
            org_id:
              type: string
            agent_id:
              type: string
            webhook_url:
              type: string
            allowed_origins:
              type: array
              items:
                type: string
            status:
              type: string
